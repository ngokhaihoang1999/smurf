<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
    <title>Làng Xì Trum - Quảng Trường Cư Dân</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Fredoka:wght@400;500;600;700&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        smurf: {
                            blue: "#00a2ff",       /* Vibrant Smurf Blue */
                            blueLight: "#e0f2fe",  /* Soft sky blue */
                            red: "#ef4444",        /* Mushroom Red / Papa Hat */
                            redLight: "#fee2e2",   /* Soft red */
                            yellow: "#ffb300",     /* Smurfette Blonde / Sun Yellow */
                            yellowLight: "#fef3c7",/* Soft yellow */
                            green: "#22c55e",      /* Grass Green */
                            greenLight: "#dcfce7",  /* Soft Green */
                            cream: "#fafaf6",      /* Friendly village ground */
                            wood: "#904d00",       /* Warm Wood */
                            woodDark: "#6e3900"    /* Darker Wood */
                        }
                    },
                    fontFamily: {
                        fredoka: ["Fredoka", "sans-serif"],
                        quicksand: ["Quicksand", "sans-serif"]
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #fafaf6;
            color: #171c22;
            font-family: 'Quicksand', sans-serif;
            background-image: radial-gradient(#99cbff 1.5px, transparent 1.5px);
            background-size: 20px 20px;
        }
        
        .wood-texture {
            background-color: #904d00;
            background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(0,0,0,0.06) 10px, rgba(0,0,0,0.06) 20px);
            border-bottom: 6px solid #6e3900;
        }
        
        .smurf-card {
            background: #ffffff;
            border: 2px solid #eaeef6;
            border-radius: 28px;
            box-shadow: 0px 8px 24px rgba(0, 98, 157, 0.12);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        
        .smurf-card:hover {
            box-shadow: 0px 12px 30px rgba(0, 98, 157, 0.18);
            transform: translateY(-4px);
        }

        .mushroom-btn {
            background-color: #ef4444;
            color: #ffffff;
            border-bottom: 5px solid #c23535;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.25);
            font-family: 'Fredoka', sans-serif;
        }
        
        .mushroom-btn:active {
            border-bottom-width: 0px;
            transform: translateY(5px) scale(0.98);
        }

        /* ── CARD 3D FLIP CONTAINER ── */
        .card-scene {
            width: 100%;
            max-width: 260px;
            perspective: 1200px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            contain: content;
        }
        
        .card-3d {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.2);
        }
        
        .card-scene.flipped .card-3d {
            transform: rotateY(180deg);
        }
        
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 28px;
            overflow: hidden;
            border: 2px solid #eaeef6;
            box-shadow: 0px 8px 24px rgba(0, 98, 157, 0.12);
            background-color: #ffffff;
        }
        
        /* Mặt sau (Thẻ Dọc - Trạng thái mặc định) */
        .card-back {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 0;
            background: #ffffff;
            overflow: hidden;
            border-radius: 28px;
        }
        
        /* Mặt trước (Thẻ Ngang - Thẻ Cư Dân đầy đủ) */
        .card-front {
            background: #ffffff;
            transform: rotateY(180deg);
        }
        
        .card-front-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Active filter badge styling */
        .filter-badge {
            background-color: #ffffff;
            border: 2px solid #e2e8f0;
            color: #475569;
            transition: all 0.2s ease;
            font-weight: 700;
        }

        .filter-badge:hover {
            border-color: #00a2ff;
            color: #00a2ff;
        }

        .filter-badge.active {
            background-color: #00a2ff;
            color: #ffffff;
            border-color: #00a2ff;
            box-shadow: 0 4px 12px rgba(0, 162, 255, 0.25);
        }

        /* ── MORPHING MODAL FOR DETAIL CARD ── */
        .modal-overlay {
            background: rgba(15, 23, 42, 0.7);
            transition: opacity 0.3s ease;
        }
        
        @media (min-width: 640px) {
            .modal-overlay {
                backdrop-filter: blur(8px);
                background: rgba(15, 23, 42, 0.5);
            }
        }
        
        /* Auto-rotate horizontal card face on mobile portrait */
        @media (max-width: 640px) and (orientation: portrait) {
            .card-front {
                top: 50% !important;
                left: 50% !important;
                transform: translate(-50%, -50%) rotate(90deg) rotateY(180deg) !important;
                position: absolute !important;
                transform-origin: center center !important;
            }
            .card-front.non-rotated-landscape {
                transform: translate(-50%, -50%) rotateY(180deg) !important;
            }
            #modalCardScaleWrapper {
                transform-origin: center center !important;
                top: 50% !important;
                left: 50% !important;
            }
        }
        
        .modal-card-container {
            perspective: 2000px;
            overflow: visible;
        }
        
        .modal-card-3d {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.15);
        }
        
        .modal-card-3d.flipped {
            transform: rotateY(180deg);
        }

        /* Style for fallback layout in modal */
        .card-preview-fallback {
            background-color: #ffffff;
            border: 4px solid #ffb300;
            border-radius: 28px;
            background-image: 
                radial-gradient(#e0f2fe 1.5px, transparent 1.5px), 
                radial-gradient(#e0f2fe 1.5px, #ffffff 1.5px);
            background-size: 25px 25px;
            box-shadow: 0px 8px 24px rgba(0, 98, 157, 0.12);
        }
        /* ── SLIDE TRANSITION FOR MODAL NAVIGATION ── */
        @keyframes slideOutLeft {
            0% { transform: translate3d(0, 0, 0); opacity: 1; }
            100% { transform: translate3d(-180px, 0, 0); opacity: 0; }
        }
        @keyframes slideInRight {
            0% { transform: translate3d(180px, 0, 0); opacity: 0; }
            100% { transform: translate3d(0, 0, 0); opacity: 1; }
        }
        @keyframes slideOutRight {
            0% { transform: translate3d(0, 0, 0); opacity: 1; }
            100% { transform: translate3d(180px, 0, 0); opacity: 0; }
        }
        @keyframes slideInLeft {
            0% { transform: translate3d(-180px, 0, 0); opacity: 0; }
            100% { transform: translate3d(0, 0, 0); opacity: 1; }
        }
        
        .animate-slide-out-left {
            animation: slideOutLeft 0.3s forwards cubic-bezier(0.55, 0.055, 0.675, 0.19);
        }
        .animate-slide-in-right {
            animation: slideInRight 0.32s forwards cubic-bezier(0.215, 0.61, 0.355, 1);
        }
        .animate-slide-out-right {
            animation: slideOutRight 0.3s forwards cubic-bezier(0.55, 0.055, 0.675, 0.19);
        }
        .animate-slide-in-left {
            animation: slideInLeft 0.32s forwards cubic-bezier(0.215, 0.61, 0.355, 1);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center pb-32">
    <!-- Top Decorative Gradient -->

    <!-- Header Section (Tactile Wood Design) -->

    <!-- ── DETAIL MODAL (3D CARD FLIP & aspect ratio morph) ── -->

        <div id="modal-backdrop" onclick="closeModal()" class="absolute inset-0 bg-slate-950/70 opacity-0 transition-opacity duration-300"></div>
        
        <!-- Morphing Card container (positioned absolutely/fixed for transition) -->
        <div class="modal-card-container shadow-[0_20px_50px_rgba(0,0,0,0.35)] rounded-[28px]" id="modalCardContainer" style="position: fixed; z-index: 101; display: none; will-change: transform;">
            <div id="modalCardAnimator" class="h-full w-full" style="will-change: transform;">
                <div class="modal-card-3d h-full w-full" id="modalCard3d" style="will-change: transform;">
                
                <!-- Mặt sau: Thẻ Dọc 3:4 (Thẻ Thống kê) -->

                        <!-- Decorative icon -->
                        <span class="absolute top-4 left-4 bg-white/80 backdrop-blur-sm text-smurf-blue p-1.5 rounded-full text-sm font-bold shadow-md material-symbols-outlined">park</span>
                    </div>
                    
                    <!-- Compact info below avatar in modal vertical card -->
                    <div class="w-full py-3.5 px-5 flex flex-col justify-center bg-white border-t border-slate-100" style="min-height: 80px;">
                        <div class="flex justify-between items-center w-full">
                            <span class="font-bold text-[16px] text-slate-700" id="m-card-real-name">Tên thật</span>
                            <span class="text-xs text-slate-400 font-bold" id="m-card-name">Tí...</span>
                        </div>
                        
                        <div class="flex justify-between w-full mt-2 pt-2 border-t border-slate-100 text-xs text-smurf-red font-bold">

                    </div>
                </div>
                
                <!-- Mặt trước: Thẻ Ngang 1.5:1 (Thiết kế phôi thẻ cư dân đầy đủ) -->
                <div class="card-face card-front relative overflow-hidden" id="modal-card-front-parent" style="background: #ffffff; border-radius: 28px;">
                    <!-- Scaled container wrapper -->

                        <!-- Background Frame (phôi card) -->

                        <!-- Avatar (nằm ở trục dọc x=80 y=138 w=589 h=823) -->
                        <div style="position: absolute; left: 80px; top: 138px; width: 589px; height: 823px; z-index: 1;">
                            <div style="width: 100%; height: 100%; overflow: hidden; background: #e8f4f8; border-radius: 12px;">
                                <img id="m-preview-smurf-avatar" src="" style="width: 100%; height: 100%; object-fit: cover; object-position: center top;" onerror="this.src='avatars/smurf_basic_placeholder.png'">
                            </div>

                        <!-- Real Name text -->
                        <div style="position: absolute; left: 812px; top: 147px; width: 552px; height: 112px; z-index: 20; display: flex; align-items: center; justify-content: center; padding: 0 40px;">
                            <div id="m-preview-real-name" style="font-family: 'Baloo 2', cursive; font-size: 50px; font-weight: 800; color: #ffffff; text-shadow: 0 3px 6px rgba(0,0,0,0.15); text-align: center; white-space: nowrap; overflow: hidden; width: 100%;">Tên thật</div>

        <!-- Controls below modal card -->

        <!-- Page Indicator & Navigation Row (mobile-only) -->

            <button onclick="navigateModal('prev')" class="w-10 h-10 bg-white/95 hover:bg-white text-slate-800 rounded-full shadow-md border border-slate-100 flex items-center justify-center active:scale-90 transition-transform">

    <!-- Script Logic -->
    <script>
        // ═══ LIVE DATA from GAS API ═══
        const GAS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbzvH1zgIVFQUXaSz_JhScriUOUByapUN5zXavJ9AowcTsqy-Q1EuWoXLALD082zPOyTow/exec";
        let RESIDENTS_DATA = [];

        async function loadResidents() {
            const grid = document.getElementById('residents-grid');
            grid.innerHTML = `<div class="col-span-full py-12 text-center"><div class="spinner" style="width:32px;height:32px;border:3px solid #e0f2fe;border-top-color:#00a2ff;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto;"></div><p class="text-slate-400 font-bold text-sm mt-3">Đang tải dữ liệu cư dân...</p></div>`;
            try {
                const resp = await fetch(GAS_WEBAPP_URL, {
                    method: 'POST', redirect: 'follow',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: 'listAll' })
                });
                const result = await resp.json();
                if (result.status === 'success' && result.residents) {
                    RESIDENTS_DATA = result.residents
                        .filter(r => {
                            const smurf = (r.smurfName || '').toLowerCase();
                            const real = (r.realName || '').toLowerCase();
                            const grp = (r.group || '').toLowerCase();
                            const tid = String(r.telegramId || '');
                            if (smurf.includes('test') || real.includes('test') || grp.includes('nhóm a') || grp === 'a' || tid === '123456' || tid === '123') {
                                return false;
                            }
                            return true;
                        })
                        .map(r => ({
                            smurfName: r.smurfName || '',
                            realName: r.realName || '',
                            group: r.group || '',
                            tinhCach: r.personality || '',

        function setFilter(filter) {

        // Modal controllers
        let modalFlipped = false;
        let activeModalItem = null;
        let lastClickedRect = null;
        let lastClickedElement = null;
        let closeTimeoutId = null;
        let manualRotateLandscape = false;
        let isNavigating = false;
        
        // Screen orientation detection helpers
        function isMobilePortrait() {
            return window.innerWidth < 640 && window.innerHeight > window.innerWidth;
        }

        function isMobileLandscape() {
            return window.innerWidth < 1024 && window.innerWidth > window.innerHeight;
        }

        // Adjust dimensions dynamically on screen resize
        function getModalTargetDimensions(isFlipped) {
            let targetWidth, targetHeight;
            
            if (isMobilePortrait()) {
                const paddingHeight = 120;
                if (isFlipped) {
                    if (manualRotateLandscape) {
                        // Non-rotated landscape mode (display horizontal)
                        targetWidth = Math.min(window.innerWidth * 0.92, 400);
                        targetHeight = targetWidth / 1.46;
                        
                        const maxHeight = window.innerHeight - paddingHeight;
                        if (targetHeight > maxHeight) {
                            targetHeight = Math.max(200, maxHeight);
                            targetWidth = targetHeight * 1.46;
                        }
                    } else {
                        // Rotated state: visual width is along screen height, visual height is along screen width
                        let vHeight = Math.min(window.innerWidth * 0.92, 400);
                        let vWidth = vHeight * 1.46;
                        
                        const maxHeight = window.innerHeight - paddingHeight;
                        if (vWidth > maxHeight) {
                            vWidth = Math.max(280, maxHeight);
                            vHeight = vWidth / 1.46;
                        }
                        
                        targetWidth = vHeight; // DOM width
                        targetHeight = vWidth; // DOM height
                    }
                } else {
                    // Normal vertical state
                    targetWidth = Math.min(window.innerWidth * 0.92, 400);
                    targetHeight = targetWidth * (4/3) + 80;
                    
                    const maxHeight = window.innerHeight - paddingHeight;
                    if (targetHeight > maxHeight) {
                        targetHeight = Math.max(280, maxHeight);
                        targetWidth = (targetHeight - 80) * (3/4);
                    }
                }
            } else if (isMobileLandscape()) {
                const paddingHeight = 40; // Side controls, so very small vertical padding
                const maxCardWidth = window.innerWidth - 220; // 180px controls + 40px gap/padding
                const maxCardHeight = window.innerHeight - paddingHeight;
                
                if (isFlipped) {
                    targetWidth = Math.min(maxCardWidth, maxCardHeight * 1.46);
                    targetHeight = targetWidth / 1.46;
                } else {
                    targetHeight = Math.min(maxCardHeight, (maxCardWidth * 4/3) + 80);
                    targetWidth = (targetHeight - 80) * (3/4);
                }
            } else {
                // Desktop / normal landscape orientation
                const paddingHeight = 120;
                if (isFlipped) {
                    targetWidth = Math.min(window.innerWidth * 0.92, 780);
                    targetHeight = targetWidth / 1.46;
                    
                    const maxHeight = window.innerHeight - paddingHeight;
                    if (targetHeight > maxHeight) {
                        targetHeight = Math.max(200, maxHeight);
                        targetWidth = targetHeight * 1.46;
                    }
                } else {
                    targetWidth = Math.min(window.innerWidth * 0.92, 400);
                    targetHeight = targetWidth * (4/3) + 80;
                    
                    const maxHeight = window.innerHeight - paddingHeight;
                    if (targetHeight > maxHeight) {
                        targetHeight = Math.max(280, maxHeight);
                        targetWidth = (targetHeight - 80) * (3/4);
                    }
                }
            }
            
            // Calculate placement
            let targetLeft, targetTop;
            if (isMobileLandscape()) {
                // Side-by-side layout: center the combination of card + controls
                const combinedWidth = targetWidth + 20 + 180; // card + gap + controls
                targetLeft = (window.innerWidth - combinedWidth) / 2;
                targetTop = (window.innerHeight - targetHeight) / 2;
            } else {
                // Centered card, controls below
                targetLeft = (window.innerWidth - targetWidth) / 2;
                targetTop = (window.innerHeight - targetHeight - 65) / 2; // Shift up slightly for controls
            }
            
            return {
                width: targetWidth,
                height: targetHeight,
                left: targetLeft,
                top: targetTop
            };
        }

        // Auto-reposition controls for landscape layouts
        function adjustControlsLayout() {
            const controls = document.getElementById('modal-controls');
            if (!controls) return;
            
            if (activeModalItem && !document.getElementById('detail-modal').classList.contains('hidden')) {
                if (isMobileLandscape()) {
                    const dims = getModalTargetDimensions(modalFlipped);
                    const combinedWidth = dims.width + 20 + 180;
                    const cardLeft = (window.innerWidth - combinedWidth) / 2;
                    
                    controls.style.position = 'fixed';
                    controls.style.top = dims.top + 'px';
                    controls.style.left = (cardLeft + dims.width + 20) + 'px';
                    controls.style.width = '180px';
                    controls.style.height = dims.height + 'px';
                    controls.style.bottom = 'auto';
                    controls.style.right = 'auto';
                    controls.style.transform = 'none';
                    controls.style.flexDirection = 'column';
                    controls.style.justifyContent = 'center';
                } else {
                    controls.style.position = '';
                    controls.style.top = '';
                    controls.style.left = '';
                    controls.style.width = '';
                    controls.style.height = '';
                    controls.style.bottom = '';
                    controls.style.right = '';
                    controls.style.transform = '';
                    controls.style.flexDirection = '';
                    controls.style.justifyContent = '';
                }
            } else {
                controls.style.position = '';
                controls.style.top = '';
                controls.style.left = '';
                controls.style.width = '';
                controls.style.height = '';
                controls.style.bottom = '';
                controls.style.right = '';
                controls.style.transform = '';
                controls.style.flexDirection = '';
                controls.style.justifyContent = '';
            }
        }

        // Apply physical aspect swap dimensions dynamically to card-front for rotation styling
        function updateCardFrontDimensions() {
            const cardFront = document.querySelector('.card-front');
            if (!cardFront) return;
            
            if (isMobilePortrait() && modalFlipped) {
                const dims = getModalTargetDimensions(true);
                if (manualRotateLandscape) {
                    cardFront.style.width = dims.width + 'px';
                    cardFront.style.height = dims.height + 'px';
                    cardFront.classList.add('non-rotated-landscape');
                } else {
                    cardFront.style.width = dims.height + 'px';
                    cardFront.style.height = dims.width + 'px';
                    cardFront.classList.remove('non-rotated-landscape');
                }
            } else {
                cardFront.style.removeProperty('width');
                cardFront.style.removeProperty('height');
                cardFront.classList.remove('non-rotated-landscape');
            }
        }

        function resizeModalCard() {
            const container = document.getElementById('modalCardContainer');
            if (!container) return;
            
            const dims = getModalTargetDimensions(modalFlipped);
            let scale;
            if (isMobilePortrait() && modalFlipped) {
                if (manualRotateLandscape) {
                    scale = dims.width / 1516;
                } else {
                    scale = dims.height / 1516;
                }
            } else {
                scale = dims.width / 1516;
            }
            
            const wrapper = document.getElementById('modalCardScaleWrapper');
            if (wrapper) {
                if (isMobilePortrait() && modalFlipped) {
                    wrapper.style.transform = `translate(-50%, -50%) scale(${scale})`;
                } else {
                    wrapper.style.transform = `translateX(-50%) scale(${scale})`;
                }
            }
            
            adjustControlsLayout();
            updateCardFrontDimensions();
            updateRotateButtonState();
        }



        // Adjust dimensions dynamically on screen resize
        window.addEventListener('resize', () => {
            if (activeModalItem && !document.getElementById('detail-modal').classList.contains('hidden')) {
                const container = document.getElementById('modalCardContainer');
                const controls = document.getElementById('modal-controls');
                const dims = getModalTargetDimensions(modalFlipped);
                
                container.style.transition = 'none'; // disable animation on window resize to avoid lagging behind
                container.style.transform = '';
                container.style.top = dims.top + 'px';
                container.style.left = dims.left + 'px';
                container.style.width = dims.width + 'px';
                container.style.height = dims.height + 'px';
                
                resizeModalCard();
            }
        });

        function openModal(smurfName, cardElement) {
            if (closeTimeoutId) {
                clearTimeout(closeTimeoutId);
                closeTimeoutId = null;
            }
            const item = RESIDENTS_DATA.find(x => x.smurfName === smurfName);
            if (!item) return;

            activeModalItem = item;
            // The card in the grid is vertical. Clicking it will pop up and flip Y to reveal the horizontal card
            modalFlipped = true; 
            manualRotateLandscape = false; // Reset manual rotation state on opening
            updateCardFrontDimensions();
            updateRotateButtonState();
            
            // Get bounding rect of the clicked card for Shared Element Transition
            const rect = cardElement.getBoundingClientRect();
            lastClickedRect = rect;
            lastClickedElement = cardElement;

            // Populate modal back card (vertical)
            document.getElementById('m-card-name').textContent = item.smurfName;
            document.getElementById('m-card-real-name').textContent = item.realName;
            document.getElementById('m-card-group').textContent = item.group;
            document.getElementById('m-card-avatar').src = item.avatar;
            document.getElementById('m-card-hobby').textContent = `🏸 ${item.soThich.split(',')[0]}`;
            document.getElementById('m-card-personality').textContent = `🧠 ${item.tinhCach.split(',')[0]}`;
            
            // Populate modal front card (horizontal scaled)
            document.getElementById('m-preview-smurf-avatar').src = item.avatar || 'avatars/smurf_basic_placeholder.png';
            document.getElementById('m-preview-real-name').textContent = item.realName || '';
            document.getElementById('m-preview-group').textContent = item.group || '';
            document.getElementById('m-preview-tinh-cach').textContent = item.tinhCach || '';
            document.getElementById('m-preview-so-thich').textContent = item.soThich || '';
            document.getElementById('m-preview-diem-manh').textContent = item.diemManh || '';
            document.getElementById('m-preview-diem-yeu').textContent = item.diemYeu || '';
            document.getElementById('m-preview-bio').textContent = item.bio || '';
            adjustAllCardFonts('m-preview-');

            // Setup final size of the modal card container centered in viewport
            const container = document.getElementById('modalCardContainer');
            const dims = getModalTargetDimensions(modalFlipped);
            
            container.style.transition = 'none';
            container.style.position = 'fixed';
            container.style.top = dims.top + 'px';
            container.style.left = dims.left + 'px';
            container.style.width = dims.width + 'px';
            container.style.height = dims.height + 'px';
            
            // Invert: Apply transform to map from final (dims) back to initial (rect)
            const scaleX = rect.width / dims.width;
            const scaleY = rect.height / dims.height;
            const translateX = rect.left - dims.left;
            const translateY = rect.top - dims.top;
            container.style.transform = `translate3d(${translateX}px, ${translateY}px, 0) scale(${scaleX}, ${scaleY})`;
            container.style.transformOrigin = 'top left';
            container.style.display = 'block';

            // Reset flip class to vertical initially so it starts unflipped at the grid card position
            const card3d = document.getElementById('modalCard3d');
            card3d.classList.remove('flipped');

            // Hide clicked grid card to create pop-up visual effect
            cardElement.style.opacity = '0';

            // Fade in modal overlay and controls
            const modal = document.getElementById('detail-modal');
            modal.classList.remove('hidden');
            modal.classList.remove('pointer-events-none');
            document.body.style.overflow = 'hidden';
            
            // Force browser reflow to apply initial inverted transform and unhide modal
            void container.offsetWidth;
            
            const backdrop = document.getElementById('modal-backdrop');
            backdrop.classList.add('opacity-100');
            
            // Setup controls
            const controls = document.getElementById('modal-controls');
            controls.classList.add('opacity-100');
            
            const navRow = document.getElementById('modal-nav-row');
            navRow.classList.add('opacity-100');
            updatePageIndicator();

            // Play: transition transform to scale(1) translate3d(0,0,0)
            container.style.transition = 'transform 0.4s cubic-bezier(0.16, 1, 0.3, 1)';
            container.style.transform = 'translate3d(0, 0, 0) scale(1, 1)';
            
            // Flip the card Y-rotation to show horizontal card
            card3d.classList.add('flipped');

            resizeModalCard();
            adjustControlsLayout();
        }

        function toggleModalFlip() {
            const card3d = document.getElementById('modalCard3d');
            const container = document.getElementById('modalCardContainer');
            
            // 1. Get current size/position of the modal container
            const prevDims = getModalTargetDimensions(modalFlipped);
            
            // 2. Toggle state
            modalFlipped = !modalFlipped;
            updateCardFrontDimensions();
            updateRotateButtonState();
            
            // 3. Get new target size/position
            const dims = getModalTargetDimensions(modalFlipped);
            
            // 4. Invert: Set static dimensions of container to the new dimensions (dims),
            // but transform it to match the old dimensions (prevDims)
            const scaleX = prevDims.width / dims.width;
            const scaleY = prevDims.height / dims.height;
            const translateX = prevDims.left - dims.left;
            const translateY = prevDims.top - dims.top;
            
            container.style.transition = 'none';
            container.style.top = dims.top + 'px';
            container.style.left = dims.left + 'px';
            container.style.width = dims.width + 'px';
            container.style.height = dims.height + 'px';
            container.style.transform = `translate3d(${translateX}px, ${translateY}px, 0) scale(${scaleX}, ${scaleY})`;
            container.style.transformOrigin = 'top left';
            
            if (modalFlipped) {
                card3d.classList.add('flipped');
            } else {
                card3d.classList.remove('flipped');
            }
            
            // 5. Play: transition transform to scale(1) translate3d(0,0,0)
            void container.offsetWidth;
            container.style.transition = 'transform 0.4s cubic-bezier(0.16, 1, 0.3, 1)';
            container.style.transform = 'translate3d(0, 0, 0) scale(1, 1)';
            
            resizeModalCard();
            adjustControlsLayout();
        }

        function closeModal() {
            if (closeTimeoutId) {
                clearTimeout(closeTimeoutId);
                closeTimeoutId = null;
            }
            const container = document.getElementById('modalCardContainer');
            const modal = document.getElementById('detail-modal');
            const backdrop = document.getElementById('modal-backdrop');
            const controls = document.getElementById('modal-controls');

            // Hide overlay background and controls
            backdrop.classList.remove('opacity-100');
            controls.classList.remove('opacity-100');
            const navRow = document.getElementById('modal-nav-row');
            navRow.classList.remove('opacity-100');
            modal.classList.add('pointer-events-none');

            if (lastClickedRect && lastClickedElement) {
                // Ensure card is flipped back to vertical front before closing to zoom back to grid position cleanly
                const card3d = document.getElementById('modalCard3d');
                card3d.classList.remove('flipped');
                
                // Get current dims of container
                const dims = getModalTargetDimensions(modalFlipped);
                
                modalFlipped = false;
                manualRotateLandscape = false; // Reset state
                updateCardFrontDimensions();
                updateRotateButtonState();

                // Calculate the final transform to zoom back into the clicked grid item coordinates (lastClickedRect)
                const scaleX = lastClickedRect.width / dims.width;
                const scaleY = lastClickedRect.height / dims.height;
                const translateX = lastClickedRect.left - dims.left;
                const translateY = lastClickedRect.top - dims.top;
                
                container.style.transition = 'transform 0.4s cubic-bezier(0.16, 1, 0.3, 1)';
                container.style.transformOrigin = 'top left';
                container.style.transform = `translate3d(${translateX}px, ${translateY}px, 0) scale(${scaleX}, ${scaleY})`;

                // Performance fix: Restore grid card opacity immediately so there is zero delay!
                lastClickedElement.style.opacity = '1';

                closeTimeoutId = setTimeout(() => {
                    container.style.display = 'none';
                    container.style.transform = '';
                    container.style.top = '';
                    container.style.left = '';
                    container.style.width = '';
                    container.style.height = '';
                    modal.classList.add('hidden');
                    document.body.style.overflow = '';
                    closeTimeoutId = null;
                    adjustControlsLayout();
                }, 400); // Wait for transition animation to finish
            } else {
                container.style.display = 'none';
                container.style.transform = '';
                container.style.top = '';
                container.style.left = '';
                container.style.width = '';
                container.style.height = '';
                manualRotateLandscape = false;
                updateRotateButtonState();
                modal.classList.add('hidden');
                document.body.style.overflow = '';
                adjustControlsLayout();
            }
        }

        function toggleCardRotation() {
            const container = document.getElementById('modalCardContainer');
            
            // Get current dimensions
            const prevDims = getModalTargetDimensions(modalFlipped);
            
            // Toggle rotation state
            manualRotateLandscape = !manualRotateLandscape;
            updateCardFrontDimensions();
            updateRotateButtonState();
            
            // Get new dimensions
            const dims = getModalTargetDimensions(modalFlipped);
            
            // FLIP morph transition for rotation
            const scaleX = prevDims.width / dims.width;
            const scaleY = prevDims.height / dims.height;
            const translateX = prevDims.left - dims.left;
            const translateY = prevDims.top - dims.top;
            
            container.style.transition = 'none';
            container.style.top = dims.top + 'px';
            container.style.left = dims.left + 'px';
            container.style.width = dims.width + 'px';
            container.style.height = dims.height + 'px';
            container.style.transform = `translate3d(${translateX}px, ${translateY}px, 0) scale(${scaleX}, ${scaleY})`;
            container.style.transformOrigin = 'top left';
            
            void container.offsetWidth;
            container.style.transition = 'transform 0.4s cubic-bezier(0.16, 1, 0.3, 1)';
            container.style.transform = 'translate3d(0, 0, 0) scale(1, 1)';
            
            resizeModalCard();
            adjustControlsLayout();
        }

        function updateRotateButtonState() {
            const rotateBtn = document.getElementById('mobile-rotate-btn');
            if (!rotateBtn) return;
            
            if (isMobilePortrait() && modalFlipped) {
                rotateBtn.style.display = 'flex';
                if (manualRotateLandscape) {
                    rotateBtn.innerHTML = '<span class="material-symbols-outlined text-base">screen_rotation</span> Xoay Đứng';
                } else {
                    rotateBtn.innerHTML = '<span class="material-symbols-outlined text-base">screen_rotation</span> Xoay Ngang';
                }
            } else {
                rotateBtn.style.display = 'none';
            }
        }

        function navigateModal(direction) {
            if (isNavigating || !activeModalItem || filteredResidentsList.length <= 1) return;
            isNavigating = true;
            
            const animator = document.getElementById('modalCardAnimator');
            const controls = document.getElementById('modal-controls');
            if (!animator || !controls) {
                isNavigating = false;
                return;
            }
            
            // Disable pointer events on all navigation buttons to prevent double clicks during animation
            const prevBtns = document.querySelectorAll('button[onclick*="prev"]');
            const nextBtns = document.querySelectorAll('button[onclick*="next"]');
            prevBtns.forEach(btn => btn.style.pointerEvents = 'none');
            nextBtns.forEach(btn => btn.style.pointerEvents = 'none');
            
            // 1. Trigger Slide-out animation
            const outClass = direction === 'next' ? 'animate-slide-out-left' : 'animate-slide-out-right';
            animator.classList.add(outClass);
            
            // 2. Wait for slide-out, then update content and trigger slide-in
            setTimeout(() => {
                let idx = filteredResidentsList.findIndex(x => x.smurfName === activeModalItem.smurfName);
                if (idx === -1) {
                    isNavigating = false;
                    return;
                }
                
                // Restore previous clicked grid card opacity
                if (lastClickedElement) {
                    lastClickedElement.style.opacity = '1';
                }
                
                // Calculate new index
                if (direction === 'next') {
                    idx = (idx + 1) % filteredResidentsList.length;
                } else {
                    idx = (idx - 1 + filteredResidentsList.length) % filteredResidentsList.length;
                }
                
                const item = filteredResidentsList[idx];
                activeModalItem = item;
                
                // Find the new grid card element to set up correct shrink target
                const gridCards = document.querySelectorAll('.card-scene');
                let newCardEl = null;
                for (let card of gridCards) {
                    if (card.getAttribute('onclick') && card.getAttribute('onclick').includes(`'${item.smurfName}'`)) {
                        newCardEl = card;
                        break;
                    }
                }
                
                if (newCardEl) {
                    lastClickedElement = newCardEl;
                    lastClickedRect = newCardEl.getBoundingClientRect();
                    newCardEl.style.opacity = '0';
                }
                
                // Update vertical card contents in modal
                document.getElementById('m-card-name').textContent = item.smurfName;
                document.getElementById('m-card-real-name').textContent = item.realName;
                document.getElementById('m-card-group').textContent = item.group;
                document.getElementById('m-card-avatar').src = item.avatar;
                document.getElementById('m-card-hobby').textContent = `🏸 ${item.soThich.split(',')[0]}`;
                document.getElementById('m-card-personality').textContent = `🧠 ${item.tinhCach.split(',')[0]}`;
                
                // Update horizontal card contents in modal
                document.getElementById('m-preview-smurf-avatar').src = item.avatar || 'avatars/smurf_basic_placeholder.png';
                document.getElementById('m-preview-real-name').textContent = item.realName || '';
                document.getElementById('m-preview-group').textContent = item.group || '';
                document.getElementById('m-preview-tinh-cach').textContent = item.tinhCach || '';
                document.getElementById('m-preview-so-thich').textContent = item.soThich || '';
                document.getElementById('m-preview-diem-manh').textContent = item.diemManh || '';
                document.getElementById('m-preview-diem-yeu').textContent = item.diemYeu || '';
                document.getElementById('m-preview-bio').textContent = item.bio || '';
                adjustAllCardFonts('m-preview-');
                
                resizeModalCard();
                updatePageIndicator();
                
                // Remove slide-out class and apply slide-in class
                animator.classList.remove(outClass);
                void animator.offsetWidth; // Force layout flush to restart animation cleanly without stutters
                
                const inClass = direction === 'next' ? 'animate-slide-in-right' : 'animate-slide-in-left';
                animator.classList.add(inClass);
                
                // 3. Clean up slide-in class after it completes and restore pointer events
                setTimeout(() => {
                    animator.classList.remove(inClass);
                    prevBtns.forEach(btn => btn.style.pointerEvents = 'auto');
                    nextBtns.forEach(btn => btn.style.pointerEvents = 'auto');
                    isNavigating = false;
                }, 350);
                
            }, 300);
        }

        // ── DYNAMIC FONT AUTO-FIT BY TEXT LENGTH ──
        function adjustAllCardFonts(prefix) {
            const nameEl = document.getElementById(prefix + 'real-name');
            if (nameEl) {
                const len = nameEl.textContent.length;
                nameEl.style.fontSize = len > 18 ? '28px' : len > 14 ? '30px' : '50px';
            }
            
            const bioEl = document.getElementById(prefix + 'bio');
            if (bioEl) {
                const len = bioEl.textContent.length;
                bioEl.style.fontSize = len > 80 ? '30px' : len > 60 ? '38px' : len > 35 ? '48px' : '60px';
            }
            
            const chips = ['tinh-cach', 'so-thich', 'diem-manh', 'diem-yeu'];
            chips.forEach(suffix => {
                const el = document.getElementById(prefix + suffix);
                if (el) {
                    const len = el.textContent.length;
                    el.style.fontSize = len > 24 ? '23px' : len > 16 ? '28px' : len > 10 ? '34px' : '40px';
                }
            });
        }

        function updatePageIndicator() {
            const indicator = document.getElementById('modal-page-indicator');
            if (!indicator || !activeModalItem) return;
            
            const idx = filteredResidentsList.findIndex(x => x.smurfName === activeModalItem.smurfName);
            if (idx !== -1) {
                indicator.textContent = `${idx + 1} / ${filteredResidentsList.length}`;
            }
        }

        // Swipe Gestures for Mobile Navigation
        let touchStartX = 0;
        let touchEndX = 0;
        
        function handleSwipe() {
            const diffX = touchEndX - touchStartX;
            if (Math.abs(diffX) > 60) { // threshold of 60px
                if (diffX > 0) {
                    navigateModal('prev');
                } else {
                    navigateModal('next');
                }
            }
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('modalCardContainer');
            if (container) {
                container.addEventListener('touchstart', e => {
                    touchStartX = e.changedTouches[0].screenX;
                }, { passive: true });
                
                container.addEventListener('touchend', e => {
                    touchEndX = e.changedTouches[0].screenX;
                    handleSwipe();
                }, { passive: true });
            }
        });

        // Run initial render — fetch live data from GAS
        loadResidents();
    </script>
</body>
</html>
