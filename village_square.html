<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
    <title>Làng Xì Trum - Quảng Trường Cư Dân</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Fredoka:wght@400;500;600;700&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        smurf: {
                            blue: "#00a2ff",       /* Vibrant Smurf Blue */
                            blueLight: "#e0f2fe",  /* Soft sky blue */
                            red: "#ef4444",        /* Mushroom Red / Papa Hat */
                            redLight: "#fee2e2",   /* Soft red */
                            yellow: "#ffb300",     /* Smurfette Blonde / Sun Yellow */
                            yellowLight: "#fef3c7",/* Soft yellow */
                            green: "#22c55e",      /* Grass Green */
                            greenLight: "#dcfce7",  /* Soft Green */
                            cream: "#fafaf6",      /* Friendly village ground */
                            wood: "#904d00",       /* Warm Wood */
                            woodDark: "#6e3900"    /* Darker Wood */
                        }
                    },
                    fontFamily: {
                        fredoka: ["Fredoka", "sans-serif"],
                        quicksand: ["Quicksand", "sans-serif"]
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #fafaf6;
            color: #171c22;
            font-family: 'Quicksand', sans-serif;
            background-image: radial-gradient(#99cbff 1.5px, transparent 1.5px);
            background-size: 20px 20px;
        }
        
        .wood-texture {
            background-color: #904d00;
            background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(0,0,0,0.06) 10px, rgba(0,0,0,0.06) 20px);
            border-bottom: 6px solid #6e3900;
        }
        
        .smurf-card {
            background: #ffffff;
            border: 2px solid #eaeef6;
            border-radius: 28px;
            box-shadow: 0px 8px 24px rgba(0, 98, 157, 0.12);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        
        .smurf-card:hover {
            box-shadow: 0px 12px 30px rgba(0, 98, 157, 0.18);
            transform: translateY(-4px);
        }

        .mushroom-btn {
            background-color: #ef4444;
            color: #ffffff;
            border-bottom: 5px solid #c23535;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.25);
            font-family: 'Fredoka', sans-serif;
        }
        
        .mushroom-btn:active {
            border-bottom-width: 0px;
            transform: translateY(5px) scale(0.98);
        }

        /* ── CARD 3D FLIP CONTAINER ── */
        .card-scene {
            width: 100%;
            max-width: 260px;
            perspective: 1200px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        
        .card-3d {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.2);
        }
        
        .card-scene.flipped .card-3d {
            transform: rotateY(180deg);
        }
        
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 28px;
            overflow: hidden;
            border: 2px solid #eaeef6;
            box-shadow: 0px 8px 24px rgba(0, 98, 157, 0.12);
            background-color: #ffffff;
        }
        
        /* Mặt sau (Thẻ Dọc - Trạng thái mặc định) */
        .card-back {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 0;
            background: #ffffff;
            overflow: hidden;
            border-radius: 28px;
        }
        
        /* Mặt trước (Thẻ Ngang - Thẻ Cư Dân đầy đủ) */
        .card-front {
            background: #ffffff;
            transform: rotateY(180deg);
        }
        
        .card-front-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Active filter badge styling */
        .filter-badge {
            background-color: #ffffff;
            border: 2px solid #e2e8f0;
            color: #475569;
            transition: all 0.2s ease;
            font-weight: 700;
        }

        .filter-badge:hover {
            border-color: #00a2ff;
            color: #00a2ff;
        }

        .filter-badge.active {
            background-color: #00a2ff;
            color: #ffffff;
            border-color: #00a2ff;
            box-shadow: 0 4px 12px rgba(0, 162, 255, 0.25);
        }

        /* ── MORPHING MODAL FOR DETAIL CARD ── */
        .modal-overlay {
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(8px);
            transition: opacity 0.3s ease;
        }
        
        .modal-card-container {
            perspective: 2000px;
            overflow: visible;
        }
        
        .modal-card-3d {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.15);
        }
        
        .modal-card-3d.flipped {
            transform: rotateY(180deg);
        }

        /* Style for fallback layout in modal */
        .card-preview-fallback {
            background-color: #ffffff;
            border: 4px solid #ffb300;
            border-radius: 28px;
            background-image: 
                radial-gradient(#e0f2fe 1.5px, transparent 1.5px), 
                radial-gradient(#e0f2fe 1.5px, #ffffff 1.5px);
            background-size: 25px 25px;
            box-shadow: 0px 8px 24px rgba(0, 98, 157, 0.12);
        }
        /* ── SLIDE TRANSITION FOR MODAL NAVIGATION ── */
        @keyframes slideOutLeft {
            0% { transform: scale(1) translateX(0); opacity: 1; filter: blur(0); }
            100% { transform: scale(0.92) translateX(-180px); opacity: 0; filter: blur(4px); }
        }
        @keyframes slideInRight {
            0% { transform: scale(0.92) translateX(180px); opacity: 0; filter: blur(4px); }
            100% { transform: scale(1) translateX(0); opacity: 1; filter: blur(0); }
        }
        @keyframes slideOutRight {
            0% { transform: scale(1) translateX(0); opacity: 1; filter: blur(0); }
            100% { transform: scale(0.92) translateX(180px); opacity: 0; filter: blur(4px); }
        }
        @keyframes slideInLeft {
            0% { transform: scale(0.92) translateX(-180px); opacity: 0; filter: blur(4px); }
            100% { transform: scale(1) translateX(0); opacity: 1; filter: blur(0); }
        }
        
        .animate-slide-out-left {
            animation: slideOutLeft 0.3s forwards cubic-bezier(0.55, 0.055, 0.675, 0.19);
        }
        .animate-slide-in-right {
            animation: slideInRight 0.32s forwards cubic-bezier(0.215, 0.61, 0.355, 1);
        }
        .animate-slide-out-right {
            animation: slideOutRight 0.3s forwards cubic-bezier(0.55, 0.055, 0.675, 0.19);
        }
        .animate-slide-in-left {
            animation: slideInLeft 0.32s forwards cubic-bezier(0.215, 0.61, 0.355, 1);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center pb-32">
    <!-- Top Decorative Gradient -->
    <div class="w-full max-w-4xl h-48 bg-gradient-to-b from-sky-200 to-transparent absolute top-0 left-50 -translate-x-50 pointer-events-none opacity-30 z-0"></div>

    <!-- Header Section (Tactile Wood Design) -->
    <header class="wood-texture fixed top-0 w-full max-w-4xl mx-auto left-0 right-0 z-50 text-white flex items-center justify-between px-6 h-16 shadow-lg rounded-b-2xl">
        <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-smurf-yellow text-3xl drop-shadow-[0_2px_4px_rgba(0,0,0,0.3)]">park</span>
            <h1 class="font-fredoka text-2xl tracking-tight text-white drop-shadow-[0_2px_4px_rgba(0,0,0,0.3)]">Quảng Trường Cư Dân</h1>
        </div>
        <div onclick="window.location.href='registration.html'" class="bg-white/20 hover:bg-white/30 text-white border border-white/30 backdrop-blur-md px-3.5 py-1.5 rounded-xl text-xs font-bold cursor-pointer transition-all flex items-center gap-1 shadow-sm">
            <span class="material-symbols-outlined text-sm">add_circle</span>
            Đăng ký thẻ
        </div>
    </header>

    <main class="w-full max-w-4xl px-6 pt-24 z-10 flex flex-col gap-6">
        <!-- Search and Filters -->
        <div class="flex flex-col gap-4 text-center items-center">
            <h2 class="font-fredoka text-3xl text-smurf-red uppercase tracking-wide">Quảng Trường Cư Dân</h2>
            <p class="text-xs font-bold text-slate-400 max-w-md">Nhấp vào thẻ dọc của thành viên để lật 3D xem mặt trước (ngang) chứa thông tin đầy đủ.</p>
            
            <!-- Search Bar -->
            <div class="w-full max-w-md relative mt-2">
                <span class="material-symbols-outlined absolute left-4 top-2.5 text-slate-400">search</span>
                <input type="text" id="search-input" oninput="filterResidents()" placeholder="Tìm kiếm tên Xì Trum hoặc tên thật..." class="w-full pl-11 pr-4 py-2.5 bg-white border-2 border-slate-200 text-slate-800 rounded-full text-sm font-bold focus:border-smurf-blue focus:ring-0 transition-all shadow-sm"/>
            </div>
            
            <!-- Filter Badges -->
            <div class="flex flex-wrap gap-2 justify-center mt-1" id="filter-container">
                <button onclick="setFilter('ALL')" class="filter-badge active px-4 py-1.5 rounded-full text-xs">Tất Cả</button>
                <button onclick="setFilter('N1')" class="filter-badge px-4 py-1.5 rounded-full text-xs">Nhánh N1</button>
                <button onclick="setFilter('N2')" class="filter-badge px-4 py-1.5 rounded-full text-xs">Nhánh N2</button>
            </div>
        </div>

        <!-- Grid of Residents -->
        <section class="grid grid-cols-2 md:grid-cols-3 gap-6 justify-items-center mt-4" id="residents-grid">
            <!-- Grid items will be injected dynamically -->
        </section>
    </main>

    <!-- ── DETAIL MODAL (3D CARD FLIP & aspect ratio morph) ── -->
    <div id="detail-modal" class="fixed inset-0 z-50 pointer-events-none opacity-0 transition-opacity duration-300">
        <!-- Backdrop -->
        <div id="modal-backdrop" onclick="closeModal()" class="absolute inset-0 bg-slate-900/50 backdrop-blur-md transition-opacity duration-300"></div>
        
        <!-- Morphing Card container (positioned absolutely/fixed for transition) -->
        <div class="modal-card-container shadow-[0_20px_50px_rgba(0,0,0,0.35)] rounded-[28px]" id="modalCardContainer" style="position: fixed; z-index: 51; display: none; will-change: transform, top, left, width, height;">
            <div id="modalCardAnimator" class="h-full w-full" style="will-change: transform;">
                <div class="modal-card-3d h-full w-full" id="modalCard3d" style="will-change: transform;">
                
                <!-- Mặt sau: Thẻ Dọc 3:4 (Thẻ Thống kê) -->
                <div class="card-face card-back flex flex-col justify-between p-0 overflow-hidden" style="background: #ffffff; border-radius: 28px;">
                    <div class="w-full relative overflow-hidden" style="aspect-ratio: 3/4;">
                        <img id="m-card-avatar" src="" alt="Avatar" class="w-full h-full object-cover">
                        <!-- Group Badge Overlay -->
                        <span class="absolute top-4 right-4 bg-smurf-blue text-white px-3 py-1 rounded-full text-xs font-bold shadow-md uppercase" id="m-card-group">Nhóm</span>
                        <!-- Decorative icon -->
                        <span class="absolute top-4 left-4 bg-white/80 backdrop-blur-sm text-smurf-blue p-1.5 rounded-full text-sm font-bold shadow-md material-symbols-outlined">park</span>
                    </div>
                    
                    <!-- Compact info below avatar in modal vertical card -->
                    <div class="w-full py-3.5 px-5 flex flex-col justify-center bg-white border-t border-slate-100" style="min-height: 80px;">
                        <div class="flex justify-between items-center w-full">
                            <span class="font-bold text-[16px] text-slate-700" id="m-card-real-name">Tên thật</span>
                            <span class="text-xs text-slate-400 font-bold" id="m-card-name">Tí...</span>
                        </div>
                        
                        <div class="flex justify-between w-full mt-2 pt-2 border-t border-slate-100 text-xs text-smurf-red font-bold">
                            <span id="m-card-hobby">🏸 Cầu lông</span>
                            <span class="text-slate-300">•</span>
                            <span id="m-card-personality">🧠 Kiên nhẫn</span>
                        </div>
                    </div>
                </div>
                
                <!-- Mặt trước: Thẻ Ngang 1.5:1 (Thiết kế phôi thẻ cư dân đầy đủ) -->
                <div class="card-face card-front relative overflow-hidden" id="modal-card-front-parent" style="background: #ffffff; border-radius: 28px;">
                    <!-- Scaled container wrapper -->
                    <div id="modalCardScaleWrapper" style="width: 1516px; height: 1038px; transform-origin: top center; position: absolute; left: 50%; transform: translateX(-50%) scale(0.5); border-radius: 40px; overflow: hidden; background: #000; will-change: transform;">
                        
                        <!-- Background Frame (phôi card) -->
                        <img id="m-preview-card-bg" src="card_bg.png" style="width: 100%; height: 100%; object-fit: cover; display: block;" onerror="this.src='card_bg.png'">
                        
                        <!-- Avatar (nằm ở trục dọc x=80 y=138 w=589 h=823) -->
                        <div style="position: absolute; left: 80px; top: 138px; width: 589px; height: 823px; z-index: 1;">
                            <div style="width: 100%; height: 100%; overflow: hidden; background: #e8f4f8; border-radius: 12px;">
                                <img id="m-preview-smurf-avatar" src="" style="width: 100%; height: 100%; object-fit: cover; object-position: center top;">
                            </div>
                        </div>

                        <!-- Cutout Overlay -->
                        <img id="m-preview-card-cutout" src="card_bg_cutout.png" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; object-fit: fill; display: block;" onerror="this.style.display='none'">

                        <!-- Real Name text -->
                        <div style="position: absolute; left: 812px; top: 147px; width: 552px; height: 112px; z-index: 20; display: flex; align-items: center; justify-content: center; padding: 0 40px;">
                            <div id="m-preview-real-name" style="font-family: 'Baloo 2', cursive; font-size: 47px; font-weight: 800; color: #ffffff; text-shadow: 0 3px 6px rgba(0,0,0,0.15); text-align: center; white-space: nowrap; overflow: hidden; width: 100%;">Tên thật</div>
                        </div>

                        <!-- Group Badge -->
                        <div id="m-preview-group" style="position: absolute; left: 1130px; top: 274px; width: 194px; height: 47px; z-index: 20; display: flex; align-items: center; justify-content: center; font-family: 'Baloo 2', cursive; font-size: 34px; font-weight: 800; color: #0b4375; text-align: center;">Nhóm</div>

                        <!-- Hobbies & Personality Tags on the Card -->
                        <div id="m-preview-tinh-cach" style="position: absolute; left: 879px; top: 410px; width: 188px; height: 121px; z-index: 20; display: flex; align-items: center; justify-content: center; font-family: 'Quicksand', sans-serif; font-size: 30px; font-weight: 700; color: #111111; text-align: center; line-height: 1.35; word-break: normal; overflow-wrap: break-word;">Tính cách</div>
                        <div id="m-preview-so-thich" style="position: absolute; left: 1236px; top: 411px; width: 185px; height: 122px; z-index: 20; display: flex; align-items: center; justify-content: center; font-family: 'Quicksand', sans-serif; font-size: 30px; font-weight: 700; color: #111111; text-align: center; line-height: 1.35; word-break: normal; overflow-wrap: break-word;">Sở thích</div>
                        <div id="m-preview-diem-manh" style="position: absolute; left: 880px; top: 619px; width: 185px; height: 124px; z-index: 20; display: flex; align-items: center; justify-content: center; font-family: 'Quicksand', sans-serif; font-size: 30px; font-weight: 700; color: #111111; text-align: center; line-height: 1.35; word-break: normal; overflow-wrap: break-word;">Điểm mạnh</div>
                        <div id="m-preview-diem-yeu" style="position: absolute; left: 1225px; top: 622px; width: 200px; height: 125px; z-index: 20; display: flex; align-items: center; justify-content: center; font-family: 'Quicksand', sans-serif; font-size: 30px; font-weight: 700; color: #111111; text-align: center; line-height: 1.35; word-break: normal; overflow-wrap: break-word;">Điểm yếu</div>

                        <!-- Bio text -->
                        <div style="position: absolute; left: 738px; top: 778px; width: 696px; height: 194px; z-index: 20; display: flex; align-items: center; justify-content: center; padding-left: 65px; padding-right: 40px;">
                            <div id="m-preview-bio" style="font-family: 'Quicksand', sans-serif; font-size: 34px; font-style: italic; font-weight: 600; color: #2b78bf; text-align: center; line-height: 1.45; width: 100%; word-break: normal; overflow-wrap: break-word;">Tự bạch mô tả bản thân...</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
        
        <!-- Controls below modal card -->
        <div id="modal-controls" class="fixed bottom-8 left-1/2 -translate-x-1/2 flex gap-4 z-[52] opacity-0 transition-opacity duration-300">
            <button onclick="toggleModalFlip()" class="mushroom-btn px-6 py-2.5 rounded-xl font-bold flex items-center gap-2 shadow-[0px_8px_24px_rgba(239,68,68,0.25)]">
                <span class="material-symbols-outlined">flip</span>
                Lật Mặt Thẻ
            </button>
            <button onclick="closeModal()" class="px-6 py-2.5 bg-white border-2 border-slate-200 text-slate-600 font-bold rounded-xl active:scale-95 transition-all flex items-center gap-2">
                <span class="material-symbols-outlined">close</span>
                Đóng lại
            </button>
        </div>
        
        <!-- Prev/Next Navigation Buttons -->
        <button onclick="navigateModal('prev')" class="fixed left-4 md:left-8 top-1/2 -translate-y-1/2 z-[53] pointer-events-auto bg-white/90 hover:bg-white text-slate-800 p-3.5 rounded-full shadow-lg border border-slate-100 hover:scale-105 active:scale-95 transition-all cursor-pointer flex items-center justify-center">
            <span class="material-symbols-outlined text-2xl font-bold">chevron_left</span>
        </button>
        <button onclick="navigateModal('next')" class="fixed right-4 md:right-8 top-1/2 -translate-y-1/2 z-[53] pointer-events-auto bg-white/90 hover:bg-white text-slate-800 p-3.5 rounded-full shadow-lg border border-slate-100 hover:scale-105 active:scale-95 transition-all cursor-pointer flex items-center justify-center">
            <span class="material-symbols-outlined text-2xl font-bold">chevron_right</span>
        </button>
    </div>

    <!-- Script Logic -->
    <script>
        // Danh sách cư dân mẫu (đồng bộ với Plan)
        const RESIDENTS_DATA = [
            { 
                smurfName: 'Tí Coding', 
                realName: 'Nguyễn Văn An', 
                group: 'N1T2', 
                tinhCach: 'Hài hước, Năng động', 
                soThich: 'Lập trình, Guitar', 
                diemManh: 'Kiên nhẫn, Sáng tạo', 
                diemYeu: 'Hay quên, Thức khuya',
                bio: 'Code và cà phê là nguồn sống! 🌙',
                avatar: 'avatars/smurf_avatar_coding_cropped_3_4.png',
                cardFront: 'the_cu_dan_Tí_Coding.png'
            },
            { 
                smurfName: 'Tí Mèo Mun', 
                realName: 'Trần Thị Bích', 
                group: 'N1T3', 
                tinhCach: 'Nhiệt tình, Thân thiện', 
                soThich: 'Vẽ tranh, Nuôi mèo', 
                diemManh: 'Sáng tạo, Tỉ mỉ', 
                diemYeu: 'Cầu toàn, Chậm quyết định',
                bio: 'Mèo mun là boss, tôi chỉ là sen thôi! 🐈',
                avatar: 'avatars/smurf_avatar_cat_cropped_3_4.png',
                cardFront: 'the_cu_dan_Tí_Mèo_Mun.png'
            },
            { 
                smurfName: 'Tí Bác Sĩ', 
                realName: 'Võ Quang Hùng', 
                group: 'N2T1', 
                tinhCach: 'Điềm tĩnh, Cẩn thiện', 
                soThich: 'Đọc sách y khoa, Cờ vua', 
                diemManh: 'Chính xác, Tập trung cao', 
                diemYeu: 'Ít nói chuyện phiếm',
                bio: 'Mỗi bệnh nhân là một cuốn sách 📖',
                avatar: 'avatars/smurf_avatar_doctor_cropped_3_4.png',
                cardFront: 'the_cu_dan_Tí_Bác_Sĩ.png'
            }
        ];

        let activeFilter = 'ALL';
        let searchQuery = '';
        let filteredResidentsList = [];

        function renderGrid() {
            const grid = document.getElementById('residents-grid');
            grid.innerHTML = '';
            
            const filtered = RESIDENTS_DATA.filter(item => {
                const matchesSearch = item.smurfName.toLowerCase().includes(searchQuery.toLowerCase()) || 
                                      item.realName.toLowerCase().includes(searchQuery.toLowerCase());
                
                let matchesGroup = true;
                if (activeFilter === 'N1') {
                    matchesGroup = item.group.startsWith('N1');
                } else if (activeFilter === 'N2') {
                    matchesGroup = item.group.startsWith('N2');
                }
                
                return matchesSearch && matchesGroup;
            });

            if (filtered.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-12 text-center text-slate-400 font-bold">Không tìm thấy cư dân nào...</div>`;
                return;
            }

            filtered.forEach(item => {
                const cardHtml = `
                    <div class="card-scene smurf-card flex flex-col overflow-hidden" onclick="openModal('${item.smurfName}', this)">
                        <!-- Full Bleed Avatar (Aspect ratio 3:4) -->
                        <div class="w-full relative overflow-hidden" style="aspect-ratio: 3/4;">
                            <img src="${item.avatar}" alt="Avatar" class="w-full h-full object-cover">
                            <!-- Decorative icon -->
                            <span class="absolute top-3 left-3 bg-white/80 backdrop-blur-sm text-smurf-blue p-1 rounded-full text-[11px] font-bold shadow-md material-symbols-outlined">park</span>
                        </div>
                        
                        <!-- Compact Info Section below avatar -->
                        <div class="w-full py-2.5 px-3.5 flex flex-col justify-center bg-white border-t border-slate-100" style="min-height: 58px;">
                            <div class="flex justify-between items-center w-full">
                                <span class="font-bold text-[13px] text-slate-700 truncate mr-2" style="max-width: 140px;">${item.realName}</span>
                                <span class="text-[9px] bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded font-bold uppercase">${item.group}</span>
                            </div>
                            <div class="text-[10px] text-slate-400 font-bold mt-1 truncate">
                                ${item.soThich.split(',')[0]} • ${item.tinhCach.split(',')[0]}
                            </div>
                        </div>
                    </div>
                `;
                grid.insertAdjacentHTML('beforeend', cardHtml);
            });
            filteredResidentsList = filtered;
        }

        function setFilter(filter) {
            activeFilter = filter;
            document.querySelectorAll('#filter-container button').forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');
            renderGrid();
        }

        function filterResidents() {
            searchQuery = document.getElementById('search-input').value;
            renderGrid();
        }

        // Modal controllers
        let modalFlipped = false;
        let activeModalItem = null;
        let lastClickedRect = null;
        let lastClickedElement = null;
        let closeTimeoutId = null;

        function resizeModalCard() {
            const container = document.getElementById('modalCardContainer');
            if (!container) return;
            // Calculate scale based on the target viewport width depending on flip state to avoid transition width lagging
            const targetWidth = modalFlipped ? Math.min(window.innerWidth * 0.92, 780) : Math.min(window.innerWidth * 0.92, 400);
            const scale = targetWidth / 1516;
            
            const wrapper = document.getElementById('modalCardScaleWrapper');
            if (wrapper) {
                wrapper.style.transform = `translateX(-50%) scale(${scale})`;
            }
        }

        // Adjust dimensions dynamically on screen resize
        function getModalTargetDimensions(isFlipped) {
            let targetWidth, targetHeight;
            const paddingHeight = 120; // Space for margins and controls below the card
            
            if (isFlipped) {
                targetWidth = Math.min(window.innerWidth * 0.92, 780);
                targetHeight = targetWidth / 1.46;
                
                // If height exceeds viewport, shrink responsive to window height
                const maxHeight = window.innerHeight - paddingHeight;
                if (targetHeight > maxHeight) {
                    targetHeight = Math.max(200, maxHeight);
                    targetWidth = targetHeight * 1.46;
                }
            } else {
                targetWidth = Math.min(window.innerWidth * 0.92, 400);
                targetHeight = targetWidth * (4/3) + 80;
                
                // If height exceeds viewport, shrink responsive to window height
                const maxHeight = window.innerHeight - paddingHeight;
                if (targetHeight > maxHeight) {
                    targetHeight = Math.max(280, maxHeight);
                    targetWidth = (targetHeight - 80) * (3/4);
                }
            }
            
            const targetLeft = (window.innerWidth - targetWidth) / 2;
            const targetTop = (window.innerHeight - targetHeight - 65) / 2; // Shift up slightly to fit controls below
            
            return {
                width: targetWidth,
                height: targetHeight,
                left: targetLeft,
                top: targetTop
            };
        }

        let scaleAnimationId = null;
        function startScaleTracking(duration = 600) {
            if (scaleAnimationId) cancelAnimationFrame(scaleAnimationId);
            const startTime = performance.now();
            
            function track() {
                const elapsed = performance.now() - startTime;
                const container = document.getElementById('modalCardContainer');
                if (container) {
                    const currentWidth = container.getBoundingClientRect().width;
                    const scale = currentWidth / 1516;
                    const wrapper = document.getElementById('modalCardScaleWrapper');
                    if (wrapper) {
                        wrapper.style.transform = `translateX(-50%) scale(${scale})`;
                    }
                }
                
                if (elapsed < duration) {
                    scaleAnimationId = requestAnimationFrame(track);
                } else {
                    scaleAnimationId = null;
                    resizeModalCard();
                }
            }
            scaleAnimationId = requestAnimationFrame(track);
        }

        function resizeModalCard() {
            const container = document.getElementById('modalCardContainer');
            if (!container) return;
            // Calculate scale based on the target viewport width depending on flip state to avoid transition width lagging
            const dims = getModalTargetDimensions(modalFlipped);
            const scale = dims.width / 1516;
            
            const wrapper = document.getElementById('modalCardScaleWrapper');
            if (wrapper) {
                wrapper.style.transform = `translateX(-50%) scale(${scale})`;
            }
        }

        // Adjust dimensions dynamically on screen resize
        window.addEventListener('resize', () => {
            if (activeModalItem && document.getElementById('detail-modal').classList.contains('opacity-100')) {
                const container = document.getElementById('modalCardContainer');
                const controls = document.getElementById('modal-controls');
                const dims = getModalTargetDimensions(modalFlipped);
                
                container.style.transition = 'none'; // disable animation on window resize to avoid lagging behind
                container.style.top = dims.top + 'px';
                container.style.left = dims.left + 'px';
                container.style.width = dims.width + 'px';
                container.style.height = dims.height + 'px';
                
                controls.style.transition = 'none';
                controls.style.top = (dims.top + dims.height + 16) + 'px';
                
                resizeModalCard();
            }
        });

        function openModal(smurfName, cardElement) {
            if (closeTimeoutId) {
                clearTimeout(closeTimeoutId);
                closeTimeoutId = null;
            }
            const item = RESIDENTS_DATA.find(x => x.smurfName === smurfName);
            if (!item) return;

            activeModalItem = item;
            // The card in the grid is vertical. Clicking it will pop up and flip Y to reveal the horizontal card
            modalFlipped = true; 
            
            // Get bounding rect of the clicked card for Shared Element Transition
            const rect = cardElement.getBoundingClientRect();
            lastClickedRect = rect;
            lastClickedElement = cardElement;

            // Populate modal back card (vertical)
            document.getElementById('m-card-name').textContent = item.smurfName;
            document.getElementById('m-card-real-name').textContent = item.realName;
            document.getElementById('m-card-group').textContent = item.group;
            document.getElementById('m-card-avatar').src = item.avatar;
            document.getElementById('m-card-hobby').textContent = `🏸 ${item.soThich.split(',')[0]}`;
            document.getElementById('m-card-personality').textContent = `🧠 ${item.tinhCach.split(',')[0]}`;
            
            // Populate modal front card (horizontal scaled)
            document.getElementById('m-preview-smurf-avatar').src = item.avatar || 'avatars/smurf_basic_placeholder.png';
            document.getElementById('m-preview-real-name').textContent = item.realName || '';
            document.getElementById('m-preview-group').textContent = item.group || '';
            document.getElementById('m-preview-tinh-cach').textContent = item.tinhCach || '';
            document.getElementById('m-preview-so-thich').textContent = item.soThich || '';
            document.getElementById('m-preview-diem-manh').textContent = item.diemManh || '';
            document.getElementById('m-preview-diem-yeu').textContent = item.diemYeu || '';
            document.getElementById('m-preview-bio').textContent = item.bio || '';

            // Setup initial position of the modal card container matching clicked card bounding box
            const container = document.getElementById('modalCardContainer');
            container.style.transition = 'none';
            container.style.position = 'fixed';
            container.style.top = rect.top + 'px';
            container.style.left = rect.left + 'px';
            container.style.width = rect.width + 'px';
            container.style.height = rect.height + 'px';
            container.style.display = 'block';

            // Reset flip class to vertical initially so it starts unflipped at the grid card position
            const card3d = document.getElementById('modalCard3d');
            card3d.classList.remove('flipped');

            // Hide clicked grid card to create pop-up visual effect
            cardElement.style.opacity = '0';

            // Fade in modal overlay and controls
            const modal = document.getElementById('detail-modal');
            modal.classList.remove('pointer-events-none');
            modal.classList.add('opacity-100');
            
            // Setup controls initial top position (matches grid card bottom, to transition along with the morph!)
            const controls = document.getElementById('modal-controls');
            controls.style.transition = 'none';
            controls.style.top = (rect.top + rect.height + 10) + 'px';
            controls.classList.add('opacity-100');

            // Force browser reflow to apply initial positioning
            void container.offsetWidth;

            // Animate card container to centered position while transitioning controls top
            const dims = getModalTargetDimensions(modalFlipped);

            container.style.transition = 'all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.2)';
            container.style.top = dims.top + 'px';
            container.style.left = dims.left + 'px';
            container.style.width = dims.width + 'px';
            container.style.height = dims.height + 'px';
            
            controls.style.transition = 'all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.2)';
            controls.style.top = (dims.top + dims.height + 16) + 'px';
            
            // Flip the card Y-rotation to show horizontal card
            card3d.classList.add('flipped');

            startScaleTracking(600);
        }

        function toggleModalFlip() {
            const card3d = document.getElementById('modalCard3d');
            const container = document.getElementById('modalCardContainer');
            const controls = document.getElementById('modal-controls');
            modalFlipped = !modalFlipped;
            
            const dims = getModalTargetDimensions(modalFlipped);
            
            if (modalFlipped) {
                card3d.classList.add('flipped');
            } else {
                card3d.classList.remove('flipped');
            }
            
            container.style.transition = 'all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.2)';
            container.style.top = dims.top + 'px';
            container.style.left = dims.left + 'px';
            container.style.width = dims.width + 'px';
            container.style.height = dims.height + 'px';
            
            controls.style.transition = 'all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.2)';
            controls.style.top = (dims.top + dims.height + 16) + 'px';
            
            startScaleTracking(600);
        }

        function closeModal() {
            if (closeTimeoutId) {
                clearTimeout(closeTimeoutId);
                closeTimeoutId = null;
            }
            const container = document.getElementById('modalCardContainer');
            const modal = document.getElementById('detail-modal');
            const controls = document.getElementById('modal-controls');

            // Hide overlay background and controls
            modal.classList.add('pointer-events-none');
            modal.classList.remove('opacity-100');
            controls.classList.remove('opacity-100');

            if (lastClickedRect && lastClickedElement) {
                // Ensure card is flipped back to vertical front before closing to zoom back to grid position cleanly
                const card3d = document.getElementById('modalCard3d');
                card3d.classList.remove('flipped');

                // Animate card container coordinates back to clicked grid item coordinates
                container.style.transition = 'all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.2)';
                container.style.top = lastClickedRect.top + 'px';
                container.style.left = lastClickedRect.left + 'px';
                container.style.width = lastClickedRect.width + 'px';
                container.style.height = lastClickedRect.height + 'px';

                // Animate controls coordinates back to clicked grid item bottom
                controls.style.transition = 'all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.2)';
                controls.style.top = (lastClickedRect.top + lastClickedRect.height + 10) + 'px';

                // Performance fix: Restore grid card opacity immediately so there is zero delay!
                lastClickedElement.style.opacity = '1';

                startScaleTracking(600);

                closeTimeoutId = setTimeout(() => {
                    container.style.display = 'none';
                    closeTimeoutId = null;
                }, 600); // Wait for transition animation to finish
            } else {
                container.style.display = 'none';
            }
        }

        function navigateModal(direction) {
            if (!activeModalItem || filteredResidentsList.length <= 1) return;
            
            const animator = document.getElementById('modalCardAnimator');
            const controls = document.getElementById('modal-controls');
            if (!animator || !controls) return;
            
            // Disable pointer events on navigation buttons to prevent double clicks during animation
            const prevBtn = document.querySelector('button[onclick*="prev"]');
            const nextBtn = document.querySelector('button[onclick*="next"]');
            if (prevBtn) prevBtn.style.pointerEvents = 'none';
            if (nextBtn) nextBtn.style.pointerEvents = 'none';
            
            // 1. Trigger Slide-out animation
            const outClass = direction === 'next' ? 'animate-slide-out-left' : 'animate-slide-out-right';
            animator.classList.add(outClass);
            
            // 2. Wait for slide-out, then update content and trigger slide-in
            setTimeout(() => {
                let idx = filteredResidentsList.findIndex(x => x.smurfName === activeModalItem.smurfName);
                if (idx === -1) return;
                
                // Restore previous clicked grid card opacity
                if (lastClickedElement) {
                    lastClickedElement.style.opacity = '1';
                }
                
                // Calculate new index
                if (direction === 'next') {
                    idx = (idx + 1) % filteredResidentsList.length;
                } else {
                    idx = (idx - 1 + filteredResidentsList.length) % filteredResidentsList.length;
                }
                
                const item = filteredResidentsList[idx];
                activeModalItem = item;
                
                // Find the new grid card element to set up correct shrink target
                const gridCards = document.querySelectorAll('.card-scene');
                let newCardEl = null;
                for (let card of gridCards) {
                    if (card.getAttribute('onclick') && card.getAttribute('onclick').includes(`'${item.smurfName}'`)) {
                        newCardEl = card;
                        break;
                    }
                }
                
                if (newCardEl) {
                    lastClickedElement = newCardEl;
                    lastClickedRect = newCardEl.getBoundingClientRect();
                    newCardEl.style.opacity = '0';
                }
                
                // Update vertical card contents in modal
                document.getElementById('m-card-name').textContent = item.smurfName;
                document.getElementById('m-card-real-name').textContent = item.realName;
                document.getElementById('m-card-group').textContent = item.group;
                document.getElementById('m-card-avatar').src = item.avatar;
                document.getElementById('m-card-hobby').textContent = `🏸 ${item.soThich.split(',')[0]}`;
                document.getElementById('m-card-personality').textContent = `🧠 ${item.tinhCach.split(',')[0]}`;
                
                // Update horizontal card contents in modal
                document.getElementById('m-preview-smurf-avatar').src = item.avatar || 'avatars/smurf_basic_placeholder.png';
                document.getElementById('m-preview-real-name').textContent = item.realName || '';
                document.getElementById('m-preview-group').textContent = item.group || '';
                document.getElementById('m-preview-tinh-cach').textContent = item.tinhCach || '';
                document.getElementById('m-preview-so-thich').textContent = item.soThich || '';
                document.getElementById('m-preview-diem-manh').textContent = item.diemManh || '';
                document.getElementById('m-preview-diem-yeu').textContent = item.diemYeu || '';
                document.getElementById('m-preview-bio').textContent = item.bio || '';
                
                const dims = getModalTargetDimensions(modalFlipped);
                controls.style.transition = 'none';
                controls.style.top = (dims.top + dims.height + 16) + 'px';
                
                resizeModalCard();
                
                // Remove slide-out class and apply slide-in class
                animator.classList.remove(outClass);
                const inClass = direction === 'next' ? 'animate-slide-in-right' : 'animate-slide-in-left';
                animator.classList.add(inClass);
                
                // 3. Clean up slide-in class after it completes and restore pointer events
                setTimeout(() => {
                    animator.classList.remove(inClass);
                    if (prevBtn) prevBtn.style.pointerEvents = 'auto';
                    if (nextBtn) nextBtn.style.pointerEvents = 'auto';
                }, 350);
                
            }, 300);
        }

        // Run initial render
        renderGrid();
    </script>
</body>
