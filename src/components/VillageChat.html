    <!-- Chat Slide-up Sheet Overlay -->
    <div class="bottom-sheet-overlay z-[110]" id="village-chat-overlay" onclick="closeVillageChat()" style="display: none; pointer-events: auto;"></div>
    
    <!-- Chat Slide-up Sheet -->
    <div class="bottom-sheet z-[111] flex flex-col" id="village-chat-sheet" style="height: 100%; max-height: 100%; display: none; pointer-events: auto;">
        <div class="bottom-sheet-handle lg:hidden"></div>
        <div class="px-4 pb-6 pt-2 flex flex-col flex-1 min-h-0">
            <div class="flex items-center justify-between mb-3 border-b border-slate-100 pb-2">
                <h3 class="font-fredoka text-base text-slate-800 flex items-center gap-1.5">
                    💬 Bảng Tin Làng Xì Trum
                </h3>
                <button onclick="closeVillageChat()" class="text-slate-400 hover:text-slate-600 p-1"><span class="material-symbols-outlined">close</span></button>
            </div>
            
            <!-- Message Stream wrapper -->
            <div class="flex-1 min-h-0 relative rounded-2xl overflow-hidden border border-slate-100 bg-slate-50">
                <!-- Background Effects Container -->
                <div id="chat-background-effects" class="absolute inset-0 pointer-events-none overflow-hidden z-0"></div>
                
                <!-- Message Stream scrolling feed -->
                <div id="chat-messages-feed" class="w-full h-full overflow-y-auto p-3 flex flex-col gap-2.5 text-xs relative z-10 bg-transparent" style="scroll-behavior: smooth;">
                    <!-- Bubbles will be injected dynamically -->
                    <p class="text-slate-400 text-center py-8 italic" id="chat-empty-state">Chưa có lời rao nào. Hãy là người đầu tiên lên tiếng!</p>
                </div>
            </div>

            <!-- Chat Mood/Effect Selector Bar -->
            <div class="flex flex-col gap-1.5 mt-3">
                <label class="text-[9px] font-extrabold text-slate-400 uppercase tracking-wider">Hiệu ứng nền toàn cảnh</label>
                <div class="flex gap-1.5 overflow-x-auto pb-1" id="chat-mood-selector">
                    <button onclick="selectChatMood('normal')" id="mood-btn-normal" class="chat-mood-badge active flex items-center gap-1 px-2.5 py-1 rounded-full text-[10px] border border-slate-200 bg-white font-bold whitespace-nowrap">
                        😊 Thường
                    </button>
                    <button onclick="selectChatMood('earthquake')" id="mood-btn-earthquake" class="chat-mood-badge flex items-center gap-1 px-2.5 py-1 rounded-full text-[10px] border border-slate-200 bg-white font-bold whitespace-nowrap">
                        💥 Chấn Động
                    </button>
                    <button onclick="selectChatMood('floating')" id="mood-btn-floating" class="chat-mood-badge flex items-center gap-1 px-2.5 py-1 rounded-full text-[10px] border border-slate-200 bg-white font-bold whitespace-nowrap">
                        🎈 Bay Bổng
                    </button>
                    <button onclick="selectChatMood('lightning')" id="mood-btn-lightning" class="chat-mood-badge flex items-center gap-1 px-2.5 py-1 rounded-full text-[10px] border border-slate-200 bg-white font-bold whitespace-nowrap">
                        ⚡ Tia Chớp
                    </button>
                    <button onclick="selectChatMood('smurfed')" id="mood-btn-smurfed" class="chat-mood-badge flex items-center gap-1 px-2.5 py-1 rounded-full text-[10px] border border-slate-200 bg-white font-bold whitespace-nowrap">
                        🍒 Mưa Quả Mọng
                    </button>
                </div>
            </div>
            
            <!-- Input Row -->
            <form onsubmit="submitChatMessage(event)" class="flex gap-2 mt-3 pt-2 border-t border-slate-100">
                <input id="chat-msg-input" type="text" placeholder="Gửi tin nhắn của bạn (tối đa 50 ký tự)..." required max-length="50" class="flex-1 bg-slate-50 border-2 border-slate-200 px-3 py-2 rounded-xl text-xs font-bold focus:outline-none focus:border-smurf-blue">
                <button type="submit" class="bg-smurf-blue text-white w-9 h-9 rounded-xl flex items-center justify-center active:scale-95 transition-all shadow-md shadow-smurf-blue/20">
                    <span class="material-symbols-outlined text-base">send</span>
                </button>
            </form>
        </div>
    </div>
