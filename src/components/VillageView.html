    <!-- ═══════════════════════════════════════ -->
    <!-- VIEW: VILLAGE (Quảng Trường Cư Dân)    -->
    <!-- ═══════════════════════════════════════ -->
    <div id="view-village" class="w-full hidden">
        <main class="w-full max-w-md mx-auto px-4 pt-16 pb-28 flex flex-col gap-3.5">
            
            <!-- Compact Search & Mushroom Filter Pills Toolbar -->
            <div class="flex flex-col gap-2.5 mt-2 bg-white/80 backdrop-blur-md p-3 rounded-2xl border border-sky-100 shadow-sm">
                <!-- Search Bar -->
                <div class="w-full relative">
                    <span class="material-symbols-outlined absolute left-3.5 top-2.5 text-slate-400 text-base">search</span>
                    <input type="text" id="search-input" oninput="filterResidents()" placeholder="Tìm tên Xì Trum hoặc tên thật..." class="w-full pl-9 pr-4 py-2 bg-slate-50 border border-slate-200 text-slate-800 rounded-xl text-xs font-bold focus:border-smurf-blue focus:bg-white focus:ring-0 transition-all"/>
                </div>
                
                <!-- Horizontal Mushroom Pill Badges for Group Filtering -->
                <div class="scroll-wrapper">
                    <div class="flex overflow-x-auto gap-1.5 pb-1 custom-scroll" id="village-group-pills">
                        <button type="button" onclick="setFilter('ALL')" class="pill-btn group-pill px-3 py-1.5 rounded-xl text-xs font-extrabold whitespace-nowrap active" data-group="ALL">🌈 Tất Cả</button>
                        <button type="button" onclick="setFilter('N1T1')" class="pill-btn group-pill px-3 py-1.5 rounded-xl text-xs font-bold whitespace-nowrap" data-group="N1T1">🍄 N1T1</button>
                        <button type="button" onclick="setFilter('N1T2')" class="pill-btn group-pill px-3 py-1.5 rounded-xl text-xs font-bold whitespace-nowrap" data-group="N1T2">🍄 N1T2</button>
                        <button type="button" onclick="setFilter('N1T3')" class="pill-btn group-pill px-3 py-1.5 rounded-xl text-xs font-bold whitespace-nowrap" data-group="N1T3">🌟 N1T3</button>
                        <button type="button" onclick="setFilter('N1T4')" class="pill-btn group-pill px-3 py-1.5 rounded-xl text-xs font-bold whitespace-nowrap" data-group="N1T4">🍄 N1T4</button>
                        <button type="button" onclick="setFilter('N1T5')" class="pill-btn group-pill px-3 py-1.5 rounded-xl text-xs font-bold whitespace-nowrap" data-group="N1T5">🍄 N1T5</button>
                        <button type="button" onclick="setFilter('N2T1')" class="pill-btn group-pill px-3 py-1.5 rounded-xl text-xs font-bold whitespace-nowrap" data-group="N2T1">⚡ N2T1</button>
                        <button type="button" onclick="setFilter('N2T2')" class="pill-btn group-pill px-3 py-1.5 rounded-xl text-xs font-bold whitespace-nowrap" data-group="N2T2">⚡ N2T2</button>
                        <button type="button" onclick="setFilter('N2T3')" class="pill-btn group-pill px-3 py-1.5 rounded-xl text-xs font-bold whitespace-nowrap" data-group="N2T3">⚡ N2T3</button>
                        <button type="button" onclick="setFilter('N2T4')" class="pill-btn group-pill px-3 py-1.5 rounded-xl text-xs font-bold whitespace-nowrap" data-group="N2T4">⚡ N2T4</button>
                        <button type="button" onclick="setFilter('N2T5')" class="pill-btn group-pill px-3 py-1.5 rounded-xl text-xs font-bold whitespace-nowrap" data-group="N2T5">⚡ N2T5</button>
                    </div>
                </div>
            </div>

            <!-- TOP 3 PODIUM SPOTLIGHT STAGE (Custom Smurf Village Assets) -->
            <div id="village-podium-spotlight" class="bg-gradient-to-b from-sky-100/70 via-sky-50/50 to-white/90 rounded-3xl p-3.5 shadow-sm border border-sky-100 flex flex-col gap-2 relative overflow-hidden">
                <div class="flex items-center justify-between border-b border-sky-100/60 pb-2">
                    <span class="font-fredoka text-xs text-smurf-blue font-extrabold uppercase tracking-wide flex items-center gap-1.5">
                        <img src="src/assets/smurf_crown_gold.png" class="w-5 h-5 object-contain" alt="Crown">
                        <span>Bục Vinh Danh Xì Trum Yêu Thích</span>
                    </span>
                    <span class="text-[9px] text-slate-400 font-bold">Top 3 Cư Dân</span>
                </div>
                <div id="podium-stage-wrapper" class="flex justify-center items-end gap-2 pt-2 pb-1 min-h-[140px]">
                    <div class="text-center py-4 text-[10px] text-slate-400 font-bold">Đang tải bục vinh danh...</div>
                </div>
            </div>

            <!-- MAIN RESIDENT AVATAR CARDS GRID (Positioned directly below Podium) -->
            <section class="grid grid-cols-2 gap-3.5 justify-items-center mt-1" id="residents-grid">
                <!-- Dynamic cards injected via JS -->
            </section>
        </main>

        <!-- Chat Drawer FAB (mobile-friendly floating trigger) - Only visible inside Village View -->
        <div id="chat-fab-container">
            <button onclick="openVillageChat()" class="fixed bottom-[124px] right-[44px] w-14 h-14 bg-smurf-blue hover:bg-smurf-blue/90 text-white rounded-full shadow-[0_8px_24px_rgba(30,144,255,0.3)] flex items-center justify-center border-2 border-white z-[70] active:scale-95 transition-all" role="button">
                <span class="material-symbols-outlined text-2xl pointer-events-none">forum</span>
                <span id="chat-badge" class="absolute -top-1 -right-1 bg-smurf-red text-white text-[9px] font-extrabold px-1.5 py-0.5 rounded-full border border-white pointer-events-none" style="display: none;">NEW</span>
            </button>
        </div>
    </div>
