    <!-- ═══════════════════════════════════════ -->
    <!-- VIEW: VILLAGE (Quảng Trường Cư Dân)    -->
    <!-- ═══════════════════════════════════════ -->
    <div id="view-village" class="w-full hidden">
        <main class="w-full max-w-md mx-auto px-4 pt-16 pb-24 flex flex-col gap-4">
            <!-- Search and Filters -->
            <div class="flex flex-col gap-3 text-center items-center mt-2">
                <p class="text-[11px] font-bold text-slate-400 max-w-xs">Nhấp vào thẻ dọc của thành viên để lật 3D xem mặt trước (ngang) chứa thông tin đầy đủ.</p>
                
                <!-- Search Bar -->
                <div class="w-full relative">
                    <span class="material-symbols-outlined absolute left-4 top-2 text-slate-400 text-lg">search</span>
                    <input type="text" id="search-input" oninput="filterResidents()" placeholder="Tìm tên Xì Trum hoặc tên thật..." class="w-full pl-10 pr-4 py-2 bg-white border-2 border-slate-200 text-slate-800 rounded-full text-xs font-bold focus:border-smurf-blue focus:ring-0 transition-all shadow-sm"/>
                </div>
                
                <!-- Filter Select Dropdown -->
                <div class="w-full relative">
                    <select id="filter-select" onchange="setFilter(this.value)" class="w-full pl-4 pr-10 py-2 bg-white border-2 border-slate-200 text-slate-800 rounded-full text-xs font-bold focus:border-smurf-blue focus:ring-0 transition-all shadow-sm appearance-none cursor-pointer">
                        <option value="ALL">Tất Cả Nhóm</option>
                        <option value="N1T1">Nhóm N1T1</option>
                        <option value="N1T2">Nhóm N1T2</option>
                        <option value="N1T3">Nhóm N1T3</option>
                        <option value="N1T4">Nhóm N1T4</option>
                        <option value="N1T5">Nhóm N1T5</option>
                        <option value="N1T6">Nhóm N1T6</option>
                        <option value="N1T7">Nhóm N1T7</option>
                        <option value="N1T8">Nhóm N1T8</option>
                        <option value="N2T1">Nhóm N2T1</option>
                        <option value="N2T2">Nhóm N2T2</option>
                        <option value="N2T3">Nhóm N2T3</option>
                        <option value="N2T4">Nhóm N2T4</option>
                        <option value="N2T5">Nhóm N2T5</option>
                    </select>
                    <!-- Custom Arrow down icon -->
                    <span class="material-symbols-outlined absolute right-4 top-2 text-slate-400 text-lg pointer-events-none">keyboard_arrow_down</span>
                </div>
            </div>

            <!-- Grid of Residents -->
            <section class="grid grid-cols-2 gap-4 justify-items-center mt-2" id="residents-grid">
                <!-- Grid items will be injected dynamically -->
            </section>
        </main>
    </div>

    <!-- Chat Drawer FAB (mobile-friendly floating trigger) -->
    <div id="chat-fab-container">
        <button onclick="openVillageChat()" class="fab-click-expand fixed bottom-24 right-4 w-12 h-12 bg-smurf-blue hover:bg-smurf-blue/90 text-white rounded-full shadow-[0_8px_24px_rgba(30,144,255,0.3)] flex items-center justify-center active:scale-95 transition-all z-40 border-2 border-white">
            <span class="material-symbols-outlined text-2xl pointer-events-none">forum</span>
            <span id="chat-badge" class="absolute -top-1 -right-1 bg-smurf-red text-white text-[9px] font-extrabold px-1.5 py-0.5 rounded-full border border-white pointer-events-none" style="display: none;">NEW</span>
        </button>
    </div>

    <!-- Chat Slide-up Sheet Overlay -->
    <div class="bottom-sheet-overlay z-[110]" id="village-chat-overlay" onclick="closeVillageChat()" style="display: none; pointer-events: auto;"></div>
    
    <!-- Chat Slide-up Sheet -->
    <div class="bottom-sheet z-[111] flex flex-col" id="village-chat-sheet" style="height: 80vh; max-height: 80vh; display: none; pointer-events: auto;">
        <div class="bottom-sheet-handle"></div>
        <div class="px-4 pb-6 pt-2 flex flex-col flex-1 min-h-0">
            <div class="flex items-center justify-between mb-3 border-b border-slate-100 pb-2">
                <h3 class="font-fredoka text-base text-slate-800 flex items-center gap-1.5">
                    💬 Bảng Tin Làng Xì Trum
                </h3>
                <button onclick="closeVillageChat()" class="text-slate-400 hover:text-slate-600 p-1"><span class="material-symbols-outlined">close</span></button>
            </div>
            
            <!-- Message Stream scrolling feed -->
            <div id="chat-messages-feed" class="flex-1 min-h-0 overflow-y-auto bg-slate-50 rounded-2xl p-3 border border-slate-100 flex flex-col gap-2.5 text-xs" style="scroll-behavior: smooth;">
                <!-- Bubbles will be injected dynamically -->
                <p class="text-slate-400 text-center py-8 italic" id="chat-empty-state">Chưa có lời rao nào. Hãy là người đầu tiên lên tiếng!</p>
            </div>

            <!-- Chat Mood/Effect Selector Bar -->
            <div class="flex flex-col gap-1.5 mt-3">
                <label class="text-[9px] font-extrabold text-slate-400 uppercase tracking-wider">Hiệu ứng bong bóng</label>
                <div class="flex gap-1.5 overflow-x-auto pb-1" id="chat-mood-selector">
                    <button onclick="selectChatMood('normal')" id="mood-btn-normal" class="chat-mood-badge active flex items-center gap-1 px-2.5 py-1 rounded-full text-[10px] border border-slate-200 bg-white font-bold whitespace-nowrap">
                        😊 Thường
                    </button>
                    <button onclick="selectChatMood('earthquake')" id="mood-btn-earthquake" class="chat-mood-badge flex items-center gap-1 px-2.5 py-1 rounded-full text-[10px] border border-slate-200 bg-white font-bold whitespace-nowrap">
                        💥 Chấn Động
                    </button>
                    <button onclick="selectChatMood('floating')" id="mood-btn-floating" class="chat-mood-badge flex items-center gap-1 px-2.5 py-1 rounded-full text-[10px] border border-slate-200 bg-white font-bold whitespace-nowrap">
                        🎈 Bay Bổng
                    </button>
                    <button onclick="selectChatMood('lightning')" id="mood-btn-lightning" class="chat-mood-badge flex items-center gap-1 px-2.5 py-1 rounded-full text-[10px] border border-slate-200 bg-white font-bold whitespace-nowrap">
                        ⚡ Tia Chớp
                    </button>
                    <button onclick="selectChatMood('smurfed')" id="mood-btn-smurfed" class="chat-mood-badge flex items-center gap-1 px-2.5 py-1 rounded-full text-[10px] border border-slate-200 bg-white font-bold whitespace-nowrap">
                        🍄 Trum Hóa
                    </button>
                </div>
            </div>
            
            <!-- Input Row -->
            <form onsubmit="submitChatMessage(event)" class="flex gap-2 mt-3 pt-2 border-t border-slate-100">
                <input id="chat-msg-input" type="text" placeholder="Gửi tin nhắn của bạn (tối đa 50 ký tự)..." required max-length="50" class="flex-1 bg-slate-50 border-2 border-slate-200 px-3 py-2 rounded-xl text-xs font-bold focus:outline-none focus:border-smurf-blue">
                <button type="submit" class="bg-smurf-blue text-white w-9 h-9 rounded-xl flex items-center justify-center active:scale-95 transition-all shadow-md shadow-smurf-blue/20">
                    <span class="material-symbols-outlined text-base">send</span>
                </button>
            </form>
        </div>
    </div>
