<!-- ═══════════════════════════════════════ -->
<!-- VIEW: HOME (Interactive Village Map)    -->
<!-- ═══════════════════════════════════════ -->
<div id="view-home" class="w-full hidden">
    <main class="w-full max-w-md mx-auto pt-16 pb-20 flex flex-col relative overflow-hidden">
        
        <!-- Welcome Header Banner -->
        <div class="px-4 py-2 bg-white/80 backdrop-blur-md border-b-2 border-smurf-blueLight flex justify-between items-center z-20 absolute top-16 left-0 right-0">
            <div>
                <p class="text-[11px] font-bold text-slate-400">CHÀO MỪNG BẠN ĐẾN</p>
                <h3 class="font-fredoka text-base text-smurf-blue flex items-center gap-1">
                    🏘️ <span id="home-welcome-name">Khách Ghé Chơi</span>
                </h3>
            </div>
            <!-- Quick stats bubble -->
            <div class="bg-smurf-blueLight text-smurf-blue px-2.5 py-1 rounded-xl text-[10px] font-bold flex items-center gap-1 shadow-sm">
                <span class="material-symbols-outlined text-xs">groups</span>
                <span id="home-village-count">0</span> cư dân
            </div>
        </div>

        <!-- 2D Pannable Map Viewport -->
        <div id="map-scroll-container" class="w-full h-[calc(100vh-216px)] overflow-auto scroll-smooth relative cursor-grab active:cursor-grabbing select-none" style="scrollbar-width: none; -ms-overflow-style: none;">
            
            <!-- Map Ground Layer (1024x1024) -->
            <div class="w-[1024px] h-[1024px] relative" style="background-image: url('src/assets/smurf_village_base_map.png'); background-size: cover; background-position: center;">
                
                <!-- Floating Clouds -->
                <div class="absolute top-10 left-[100px] text-5xl opacity-20 pointer-events-none float-cloud" style="animation: floatSlow 25s linear infinite;">☁️</div>
                <div class="absolute top-32 left-[500px] text-4xl opacity-20 pointer-events-none float-cloud" style="animation: floatSlow 32s linear infinite 5s;">☁️</div>
                <div class="absolute top-20 left-[800px] text-5xl opacity-15 pointer-events-none float-cloud" style="animation: floatSlow 28s linear infinite 10s;">☁️</div>

                <!-- 1. LANDMARK: Papa Smurf's House (Link to Tab 2: Profile/My Card) -->
                <div class="absolute group cursor-pointer z-10 hover-bounce" style="top: 280px; left: 160px; width: 150px;" onclick="showProfileTab()">
                    <img src="src/assets/smurf_papa_house.png" alt="Nhà Tí Vua" class="w-full h-auto drop-shadow-[0_8px_16px_rgba(0,0,0,0.2)]">
                    <!-- Tooltip label -->
                    <div class="absolute -top-8 left-1/2 -translate-x-1/2 bg-smurf-blue text-white text-[10px] font-bold px-2.5 py-1 rounded-full whitespace-nowrap opacity-90 group-hover:opacity-100 shadow-md border-2 border-white transition-all scale-95 group-hover:scale-100">
                        🍄 Nhà Của Bạn (Hồ Sơ)
                    </div>
                </div>

                <!-- 2. LANDMARK: Village Plaza (Link to Tab 3: Village Square) -->
                <div class="absolute group cursor-pointer z-10 hover-bounce" style="top: 420px; left: 520px; width: 130px;" onclick="showVillageTab()">
                    <img src="src/assets/smurf_blue_house.png" alt="Quảng Trường" class="w-full h-auto drop-shadow-[0_8px_16px_rgba(0,0,0,0.2)]">
                    <div class="absolute -top-8 left-1/2 -translate-x-1/2 bg-smurf-green text-white text-[10px] font-bold px-2.5 py-1 rounded-full whitespace-nowrap opacity-90 group-hover:opacity-100 shadow-md border-2 border-white transition-all scale-95 group-hover:scale-100">
                        🏘️ Quảng Trường Cư Dân
                    </div>
                </div>

                <!-- 3. LANDMARK: Signpost (Link to Registration / Guest Info) -->
                <div class="absolute group cursor-pointer z-10 hover-bounce" style="top: 600px; left: 360px; width: 95px;" onclick="handleSignpostClick()">
                    <img src="src/assets/smurf_signpost.png" alt="Biển Chỉ Đường" class="w-full h-auto drop-shadow-[0_8px_16px_rgba(0,0,0,0.2)]">
                    <div class="absolute -top-8 left-1/2 -translate-x-1/2 bg-smurf-yellow text-slate-800 text-[10px] font-extrabold px-2.5 py-1 rounded-full whitespace-nowrap opacity-90 group-hover:opacity-100 shadow-md border-2 border-white transition-all scale-95 group-hover:scale-100">
                        📋 <span id="signpost-text">Đăng Ký Cư Dân</span>
                    </div>
                </div>

                <!-- 4. LANDMARK: Magic Mushroom (Roll Fortune) -->
                <div class="absolute group cursor-pointer z-20 hover-bounce" style="top: 360px; left: 370px; width: 85px;" onclick="rollMagicMushroom()">
                    <img src="src/assets/smurf_magic_mushroom.png" alt="Nấm Thần Kỳ" class="w-full h-auto drop-shadow-[0_0_15px_rgba(168,85,247,0.6)] animate-pulse">
                    <div class="absolute -top-8 left-1/2 -translate-x-1/2 bg-purple-600 text-white text-[10px] font-bold px-2.5 py-1 rounded-full whitespace-nowrap opacity-90 group-hover:opacity-100 shadow-md border-2 border-white transition-all scale-95 group-hover:scale-100">
                        🔮 Hái Nấm May Mắn
                    </div>
                </div>

            </div>
        </div>

        <!-- Confetti Canvas overlay -->
        <canvas id="confetti-canvas" class="absolute inset-0 w-full h-full pointer-events-none z-30"></canvas>

        <!-- Fortune Modal (Popup) -->
        <div id="fortune-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[150] flex items-center justify-center p-4 hidden opacity-0 transition-opacity duration-300">
            <div class="bg-white rounded-3xl w-full max-w-xs p-6 shadow-2xl border-4 border-purple-300 flex flex-col items-center text-center transform scale-95 transition-transform duration-300 relative overflow-hidden">
                
                <!-- Glowing backdrop -->
                <div class="absolute -top-20 -left-20 w-40 h-40 bg-purple-200 rounded-full filter blur-3xl opacity-55"></div>
                <div class="absolute -bottom-20 -right-20 w-40 h-40 bg-pink-200 rounded-full filter blur-3xl opacity-55"></div>
                
                <span class="text-5xl mb-2 z-10 animate-bounce">🍄</span>
                <h3 class="font-fredoka text-xl text-purple-600 mb-1 z-10">Lộc Nấm Thần Kỳ</h3>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wide mb-4 z-10">Papa Smurf Gửi Lời</p>
                
                <!-- Fortune Result Container -->
                <div class="bg-purple-50 border-2 border-purple-100 p-4 rounded-2xl w-full mb-5 z-10 min-h-[100px] flex flex-col justify-center items-center">
                    <p id="fortune-text" class="text-sm font-bold text-slate-700 leading-relaxed"></p>
                    <p id="fortune-quest" class="text-xs font-bold text-purple-600 mt-2 italic leading-relaxed"></p>
                </div>
                
                <!-- Close Button -->
                <button onclick="closeFortuneModal()" class="w-full py-3 bg-purple-600 hover:bg-purple-700 text-white rounded-2xl font-fredoka font-bold text-sm transition-all active:scale-95 shadow-lg shadow-purple-500/25 z-10">
                    Nhận Lộc Làng Xì Trum
                </button>
            </div>
        </div>

    </main>
</div>

<style>
/* CSS Animations for vivid map */
@keyframes floatSlow {
    0% { transform: translateX(-150px); }
    100% { transform: translateX(1100px); }
}
.hover-bounce {
    transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.hover-bounce:hover {
    transform: scale(1.08);
}
.hover-bounce:active {
    transform: scale(0.95);
}
</style>
