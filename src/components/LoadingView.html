    <!-- ═══════════════════════════════════════ -->
    <!-- VIEW: LOADING & GOOGLE SIGN-IN         -->
    <!-- ═══════════════════════════════════════ -->
    <div id="view-loading" class="loading-spinner w-full flex flex-col items-center justify-center p-6 text-center">
        <!-- Initial Connect Spinner (Hidden when login box is active) -->
        <div class="spinner mb-3 hidden" id="loading-spinner-circle"></div>
        <p class="font-fredoka text-xl text-smurf-blue drop-shadow-sm mb-1 hidden" id="loading-status-title">Đang kết nối Làng Xì Trum...</p>
        <p class="text-xs text-slate-500 font-bold mb-5 hidden" id="loading-status-sub">Định danh cư dân bằng Tài khoản Google</p>

        <!-- Google Sign-In & Instant Fallback Box -->
        <div id="google-signin-box" class="w-full max-w-xs bg-white/95 backdrop-blur-md p-5 rounded-2xl border-2 border-smurf-blueLight shadow-xl flex flex-col items-center gap-3 transition-all">
            <div class="flex items-center gap-2 text-slate-700">
                <span class="material-symbols-outlined text-smurf-blue text-2xl">account_circle</span>
                <span class="font-fredoka text-base text-slate-800">Đăng Nhập Cư Dân</span>
            </div>
            
            <p class="text-xs text-slate-600 font-bold leading-relaxed">Đăng nhập bằng Google hoặc nhập Email đã đăng ký để vào Làng Xì Trum.</p>

            <!-- Render Target for Google Button -->
            <div id="google-btn-wrapper" class="w-full flex justify-center py-1 min-h-[40px]"></div>

            <!-- Fallback Direct Email Input (Always accessible if Google script is blocked) -->
            <div id="manual-login-fallback" class="w-full flex flex-col gap-2 border-t border-slate-100 pt-3">
                <p class="text-[11px] text-slate-400 font-bold text-left">Hoặc nhập Email cư dân:</p>
                <div class="flex gap-1.5 w-full">
                    <input type="email" id="fallback-email-input" placeholder="nhap.email@gmail.com" class="flex-1 px-3 py-2 text-xs rounded-xl border border-slate-200 focus:outline-none focus:border-smurf-blue font-bold text-slate-700">
                    <button onclick="submitFallbackEmail()" class="px-3.5 py-2 bg-smurf-blue text-white rounded-xl text-xs font-bold shadow-sm hover:bg-blue-600 active:scale-95 transition-all">Vào Làng</button>
                </div>
            </div>

            <p class="text-[10px] text-slate-400 font-bold italic mt-0.5">
                🔒 Đăng nhập bảo mật để tự động nạp hồ sơ thẻ cư dân.
            </p>
        </div>
    </div>
