<!-- ═══════════════════════════════════════ -->
<!-- VIEW: PROFILE (My Resident Card)        -->
<!-- ═══════════════════════════════════════ -->
<div id="view-profile" class="w-full hidden">
    <main class="w-full max-w-md mx-auto px-4 pt-16 pb-20 flex flex-col gap-4">
        
        <!-- Embedded 3D Card Section -->
        <div class="flex flex-col items-center justify-center pt-4 relative" style="min-height: 380px;">
            <!-- Clouds backdrop -->
            <div class="cloud" style="top: 5%; animation-duration: 20s; animation-delay: 0s;">☁️</div>
            <div class="cloud" style="top: 15%; animation-duration: 24s; animation-delay: 4s; font-size: 24px;">☁️</div>
            <div class="sparkle" style="top: 10%; left: 10%; animation-delay: 0s;">✨</div>
            <div class="sparkle" style="top: 20%; right: 10%; animation-delay: 1s;">✨</div>

            <!-- 3D Card Scene -->
            <div id="profile-card-scene" class="card-scene relative z-10" onclick="toggleProfileCardFlip()" style="width: 270px; height: 360px; perspective: 1200px;">
                <div id="profile-card-3d" class="card-3d w-full h-full relative" style="transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.2);">
                    
                    <!-- FACE BACK: Vertical Card (3:4) -->
                    <div class="card-face card-back absolute inset-0 w-full h-full backface-hidden rounded-3xl border-2 border-slate-200 shadow-lg flex flex-col justify-between overflow-hidden" style="background: #ffffff;">
                        <div class="relative w-full overflow-hidden" style="aspect-ratio: 3 / 4;">
                            <img id="profile-avatar" src="avatars/smurf_basic_placeholder.png" alt="Avatar" class="w-full h-full object-cover" onerror="this.src='avatars/smurf_basic_placeholder.png'">
                            <!-- Group Badge Overlay -->
                            <span class="absolute top-3 right-3 bg-smurf-blue text-white px-2.5 py-0.5 rounded-full text-[10px] font-bold shadow-md uppercase" id="profile-card-group-badge">Nhóm</span>
                            <!-- Pending Badge if avatar is basic placeholder -->
                            <div class="absolute bottom-2 left-1/2 -translate-x-1/2 bg-amber-500/90 text-white text-[9px] font-bold px-2 py-0.5 rounded-full shadow-sm whitespace-nowrap animate-pulse" id="profile-avatar-pending-badge">🎨 Avatar đang được vẽ...</div>
                        </div>
                        <!-- Name & Basic details -->
                        <div class="py-2.5 px-4 bg-white border-t border-slate-100 flex flex-col justify-center min-h-[64px]">
                            <div class="flex justify-between items-center w-full">
                                <span class="font-bold text-[14px] text-slate-700" id="profile-card-real-name">Họ Tên</span>
                                <span class="text-[11px] text-slate-400 font-extrabold" id="profile-card-smurf-name">Tí Smurf</span>
                            </div>
                            <div class="flex justify-between w-full mt-1.5 pt-1.5 border-t border-slate-100 text-[10px] text-smurf-red font-bold">
                                <span id="profile-card-hobby">🏸 Sở thích</span>
                                <span class="text-slate-300">•</span>
                                <span id="profile-card-personality">🧠 Tính cách</span>
                            </div>
                        </div>
                    </div>

                    <!-- FACE FRONT: Horizontal Card (1.5:1) -->
                    <div class="card-face card-front absolute inset-0 w-full h-full backface-hidden rounded-3xl border-2 border-slate-200 shadow-lg overflow-hidden" style="transform: rotateY(180deg); background: #000;">
                        <!-- Scaled card container (rendered exactly like phôi card) -->
                        <div id="cardSheetScaleWrapper" style="width: 1516px; height: 1038px; transform-origin: top center; position: absolute; left: 50%; transform: translateX(-50%) scale(0.178); border-radius: 40px; overflow: hidden; background: #000;">
                            <img src="card_bg.png" style="width: 100%; height: 100%; object-fit: cover; display: block;" onerror="this.src='card_bg.png'">
                            <!-- Avatar container inside horizontal card -->
                            <div style="position: absolute; left: 80px; top: 138px; width: 589px; height: 823px; z-index: 1;">
                                <div style="width: 100%; height: 100%; overflow: hidden; background: #e8f4f8; border-radius: 12px;">
                                    <img id="profile-card-horizontal-avatar" src="avatars/smurf_basic_placeholder.png" style="width: 100%; height: 100%; object-fit: cover; object-position: center top;" onerror="this.src='avatars/smurf_basic_placeholder.png'">
                                </div>
                            </div>
                            <img src="card_bg_cutout.png" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; object-fit: fill;" onerror="this.style.display='none'">
                            <div style="position: absolute; left: 812px; top: 147px; width: 552px; height: 112px; z-index: 20; display: flex; align-items: center; justify-content: center; padding: 0 40px;">
                                <div id="profile-card-horizontal-real-name" style="font-family: 'Baloo 2', cursive; font-size: 50px; font-weight: 800; color: #ffffff; text-shadow: 0 3px 6px rgba(0,0,0,0.15); text-align: center; white-space: nowrap; overflow: hidden; width: 100%;">Họ Tên</div>
                            </div>
                            <div id="profile-card-horizontal-group" style="position: absolute; left: 1130px; top: 274px; width: 194px; height: 47px; z-index: 20; display: flex; align-items: center; justify-content: center; font-family: 'Baloo 2', cursive; font-size: 36px; font-weight: 800; color: #0b4375;">Nhóm</div>
                            <div id="profile-card-horizontal-tinh-cach" style="position: absolute; left: 879px; top: 400px; width: 188px; height: 121px; z-index: 20; display: flex; align-items: center; justify-content: center; font-family: 'Quicksand'; font-size: 40px; font-weight: 700; color: #111; text-align: center; line-height: 1.35; overflow-wrap: break-word;">Tính cách</div>
                            <div id="profile-card-horizontal-so-thich" style="position: absolute; left: 1236px; top: 401px; width: 185px; height: 122px; z-index: 20; display: flex; align-items: center; justify-content: center; font-family: 'Quicksand'; font-size: 40px; font-weight: 700; color: #111; text-align: center; line-height: 1.35; overflow-wrap: break-word;">Sở thích</div>
                            <div id="profile-card-horizontal-diem-manh" style="position: absolute; left: 880px; top: 609px; width: 185px; height: 124px; z-index: 20; display: flex; align-items: center; justify-content: center; font-family: 'Quicksand'; font-size: 40px; font-weight: 700; color: #111; text-align: center; line-height: 1.35; overflow-wrap: break-word;">Điểm mạnh</div>
                            <div id="profile-card-horizontal-diem-yeu" style="position: absolute; left: 1225px; top: 612px; width: 200px; height: 125px; z-index: 20; display: flex; align-items: center; justify-content: center; font-family: 'Quicksand'; font-size: 40px; font-weight: 700; color: #111; text-align: center; line-height: 1.35; overflow-wrap: break-word;">Điểm yếu</div>
                            <div style="position: absolute; left: 738px; top: 768px; width: 696px; height: 194px; z-index: 20; display: flex; align-items: center; justify-content: center; padding-left: 65px; padding-right: 40px;">
                                <div id="profile-card-horizontal-bio" style="font-family: 'Quicksand'; font-size: 60px; font-style: italic; font-weight: 600; color: #2b78bf; text-align: center; line-height: 1.45; width: 100%; overflow-wrap: break-word;">Bio</div>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
            
            <button onclick="toggleProfileCardFlipEvent(event)" class="absolute bottom-2 right-6 bg-white/95 text-slate-600 border border-slate-200 px-3 py-1.5 rounded-full text-xs font-bold shadow-md flex items-center gap-1 active:scale-95 transition-all z-20">
                <span class="material-symbols-outlined text-sm">flip</span>
                Lật Thẻ
            </button>
        </div>

        <!-- Details Text Block -->
        <div class="bg-white rounded-3xl p-5 border-2 border-slate-100 shadow-sm flex flex-col gap-3">
            <div class="text-center pb-3 border-b border-slate-100">
                <h3 class="font-fredoka text-lg text-smurf-blue pl-2" id="profile-smurf-name">Tí Coding</h3>
                <p class="text-xs text-slate-400 font-bold" id="profile-subtitle">Real Name · Group</p>
            </div>
            <div class="grid grid-cols-2 gap-3 text-xs">
                <div class="bg-slate-50 p-2.5 rounded-xl border border-slate-100/50">
                    <span class="font-bold text-slate-400 block mb-0.5">SỞ THÍCH</span>
                    <span class="font-bold text-slate-700" id="profile-detail-hobbies">-</span>
                </div>
                <div class="bg-slate-50 p-2.5 rounded-xl border border-slate-100/50">
                    <span class="font-bold text-slate-400 block mb-0.5">TÍNH CÁCH</span>
                    <span class="font-bold text-slate-700" id="profile-detail-personality">-</span>
                </div>
                <div class="bg-slate-50 p-2.5 rounded-xl border border-slate-100/50">
                    <span class="font-bold text-slate-400 block mb-0.5">ĐIỂM MẠNH</span>
                    <span class="font-bold text-slate-700" id="profile-detail-strength">-</span>
                </div>
                <div class="bg-slate-50 p-2.5 rounded-xl border border-slate-100/50">
                    <span class="font-bold text-slate-400 block mb-0.5">ĐIỂM YẾU</span>
                    <span class="font-bold text-slate-700" id="profile-detail-weakness">-</span>
                </div>
            </div>
            <div class="bg-slate-50 p-3 rounded-xl border border-slate-100/50 text-xs">
                <span class="font-bold text-slate-400 block mb-1">GIỚI THIỆU BẢN THÂN</span>
                <p class="text-slate-600 leading-relaxed italic" id="profile-detail-bio">"-"</p>
            </div>
        </div>

        <!-- Action Buttons Row -->
        <div class="flex flex-col gap-2.5">
            <div class="flex gap-2">
                <!-- Download Card Button -->
                <button onclick="downloadResidentCard()" class="flex-1 mushroom-btn py-3.5 rounded-2xl font-fredoka text-sm flex items-center justify-center gap-1.5 relative overflow-hidden">
                    <div class="absolute inset-x-0 top-0 h-1/2 bg-white opacity-15 rounded-t-2xl"></div>
                    <span class="material-symbols-outlined text-base">download</span>
                    <span>Tải Thẻ Ngang</span>
                </button>
                <!-- Download Avatar Button -->
                <button onclick="downloadPortraitAvatar()" class="flex-1 bg-white border-2 border-slate-200 text-slate-700 py-3.5 rounded-2xl font-fredoka text-sm flex items-center justify-center gap-1.5 active:scale-95 transition-all shadow-sm">
                    <span class="material-symbols-outlined text-base">download</span>
                    <span>Tải Avatar</span>
                </button>
            </div>
            
            <!-- Edit Button -->
            <button onclick="openEditSheet()" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-700 py-3.5 rounded-2xl font-fredoka text-sm flex items-center justify-center gap-1.5 active:scale-95 transition-all">
                <span class="material-symbols-outlined text-base">edit</span>
                <span>Chỉnh Sửa Thông Tin</span>
            </button>
        </div>
        
    </main>
</div>
