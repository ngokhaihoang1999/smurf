    <!-- ═══════════════════════════════════════ -->
    <!-- VIEW: PROFILE (Avatar Hub)             -->
    <!-- ═══════════════════════════════════════ -->
    <div id="view-profile" class="w-full hidden">
        <main class="w-full max-w-md mx-auto px-4 pt-16 pb-20 flex flex-col gap-4">
            <!-- Avatar Stage -->
            <div class="avatar-stage p-4 flex flex-col items-center justify-center relative" style="min-height: 280px;">
                <!-- Clouds -->
                <div class="cloud" style="top: 12%; animation-duration: 18s; animation-delay: 0s;">☁️</div>
                <div class="cloud" style="top: 8%; animation-duration: 22s; animation-delay: 6s; font-size: 22px;">☁️</div>
                <div class="cloud" style="top: 20%; animation-duration: 25s; animation-delay: 12s; font-size: 20px;">☁️</div>
                <!-- Sparkles -->
                <div class="sparkle" style="top: 15%; left: 15%; animation-delay: 0s;">✨</div>
                <div class="sparkle" style="top: 25%; right: 12%; animation-delay: 0.7s;">✨</div>
                <div class="sparkle" style="top: 10%; right: 30%; animation-delay: 1.4s;">✨</div>
                <div class="sparkle" style="bottom: 25%; left: 20%; animation-delay: 2.1s;">✨</div>
                <!-- Avatar -->
                <div class="avatar-bob relative z-10 mt-4">
                    <img id="profile-avatar" src="avatars/smurf_basic_placeholder.png" alt="Avatar" 
                         style="width: 160px; height: 213px; object-fit: cover; border-radius: 16px; border: 4px solid white; box-shadow: 0 8px 30px rgba(0,0,0,0.15);"
                         onerror="this.src='avatars/smurf_basic_placeholder.png'">
                </div>
                <div class="avatar-shadow mt-1"></div>
                <!-- Pending badge (shown when no custom avatar) -->
                <div class="avatar-pending" id="avatar-pending-badge">🎨 Avatar đang được vẽ...</div>
                <!-- Ground decorations -->
                <div class="absolute bottom-3 left-6 text-2xl pointer-events-none">🍄</div>
                <div class="absolute bottom-3 right-6 text-2xl pointer-events-none">🍄</div>
                <div class="absolute bottom-4 left-1/2 -translate-x-1/2 text-xl pointer-events-none">🌿</div>
            </div>

            <!-- Name Plate -->
            <div class="name-plate px-6 py-3 text-center">
                <h2 class="font-fredoka text-xl text-smurf-blue pl-3" id="profile-smurf-name">Tí Coding</h2>
                <p class="text-sm font-bold text-slate-500 pl-3" id="profile-subtitle">
                     <span id="profile-real-name">Nguyễn Văn An</span> · <span id="profile-group">N1T2</span>
                </p>
                <p class="text-xs text-slate-400 italic mt-1 pl-3" id="profile-bio">"Code và cà phê là nguồn sống!"</p>
            </div>

            <!-- Action Buttons -->
            <div class="flex">
                <button onclick="openCardSheet()" class="w-full mushroom-btn py-3.5 rounded-2xl font-fredoka text-base flex items-center justify-center gap-2 relative overflow-hidden">
                    <div class="absolute inset-x-0 top-0 h-1/2 bg-white opacity-15 rounded-t-2xl"></div>
                    <span class="material-symbols-outlined text-lg relative z-10">badge</span>
                    <span class="relative z-10">Xem Thẻ Cư Dân</span>
                </button>
            </div>
        </main>
    </div>
