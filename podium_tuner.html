<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smurf Podium Alignment & Size Tuner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', sans-serif; background: #eef6fa; }
        .font-fredoka { font-family: 'Fredoka', cursive; }
    </style>
</head>
<body class="p-4 md:p-8 flex flex-col items-center gap-6">

    <div class="w-full max-w-xl bg-white rounded-3xl p-6 shadow-xl border border-sky-100 flex flex-col gap-4">
        <div class="flex justify-between items-center border-b pb-3">
            <h1 class="font-fredoka text-lg text-sky-900 font-bold flex items-center gap-2">
                <span>⚙️ Tool Điều Chỉnh Vòng Nguyệt Quế & Avatar</span>
            </h1>
            <span class="text-xs text-slate-400 font-bold">Smurf Live Tuner</span>
        </div>

        <!-- LIVE PREVIEW CONTAINER -->
        <div class="w-full bg-gradient-to-b from-sky-100/70 via-sky-50/50 to-white rounded-2xl p-4 border border-sky-200 flex flex-col items-center gap-2 min-h-[260px] justify-center relative overflow-hidden">
            <span class="text-xs font-bold text-sky-600 uppercase tracking-wider mb-2">Xem Trước Thực Tế (Live Preview)</span>
            
            <div id="tuner-stage" class="flex justify-center items-end gap-3 w-full pt-4 pb-2">
                <!-- TOP 2 (SILVER) -->
                <div class="flex flex-col items-center w-[95px] relative">
                    <span class="text-[9px] bg-slate-200 text-slate-700 px-2 py-0.5 rounded-full font-extrabold mb-1">TOP 2</span>
                    <div id="box-top2" class="relative flex items-center justify-center aspect-square">
                        <div id="avatar-top2" class="rounded-full overflow-hidden shadow-md bg-white border-2 border-slate-300 relative z-0 flex items-center justify-center">
                            <img src="avatars/avatar_1539535605.png" class="w-full h-full object-cover">
                        </div>
                        <img id="wreath-top2" src="src/assets/smurf_laurel_silver.png?v=8ec8f09" class="absolute pointer-events-none z-10 filter drop-shadow-md">
                    </div>
                    <span class="text-xs font-bold text-slate-800 mt-1">Tí Ăn Chơi</span>
                </div>

                <!-- TOP 1 (GOLD) -->
                <div class="flex flex-col items-center w-[125px] relative -mt-4">
                    <img src="src/assets/smurf_crown_gold.png" class="w-8 h-8 object-contain absolute -top-5 z-30 animate-bounce">
                    <span class="text-[9px] bg-amber-400 text-white px-2.5 py-0.5 rounded-full font-extrabold mb-1 z-20 shadow-md">TOP 1</span>
                    <div id="box-top1" class="relative flex items-center justify-center aspect-square">
                        <div id="avatar-top1" class="rounded-full overflow-hidden shadow-lg ring-4 ring-amber-400/50 bg-white border-2 border-amber-300 relative z-0 flex items-center justify-center">
                            <img src="avatars/avatar_ngokhaihoang1999_gmail_com.png" class="w-full h-full object-cover" onerror="this.src='avatars/smurf_basic_placeholder.png'">
                        </div>
                        <img id="wreath-top1" src="src/assets/smurf_laurel_gold.png?v=8ec8f09" class="absolute pointer-events-none z-10 filter drop-shadow-lg">
                    </div>
                    <span class="text-xs font-extrabold text-amber-950 mt-1">Tí Kế Hoạch</span>
                </div>

                <!-- TOP 3 (BRONZE) -->
                <div class="flex flex-col items-center w-[95px] relative">
                    <span class="text-[9px] bg-amber-100 text-amber-800 px-2 py-0.5 rounded-full font-extrabold mb-1">TOP 3</span>
                    <div id="box-top3" class="relative flex items-center justify-center aspect-square">
                        <div id="avatar-top3" class="rounded-full overflow-hidden shadow-md bg-white border-2 border-amber-700/40 relative z-0 flex items-center justify-center">
                            <img src="avatars/avatar_1539535605.png" class="w-full h-full object-cover">
                        </div>
                        <img id="wreath-top3" src="src/assets/smurf_laurel_bronze.png?v=8ec8f09" class="absolute pointer-events-none z-10 filter drop-shadow-md">
                    </div>
                    <span class="text-xs font-bold text-slate-800 mt-1">Tí Meow Labs</span>
                </div>
            </div>
        </div>

        <!-- CONTROL SLIDERS FORM -->
        <div class="flex flex-col gap-4 pt-2">
            <!-- TOP 1 CONTROLS -->
            <div class="p-4 bg-amber-50 rounded-2xl border border-amber-200 flex flex-col gap-3">
                <h3 class="font-extrabold text-amber-900 text-xs uppercase flex items-center gap-1.5">
                    <span>🥇 Top 1 Vinh Danh (Vòng Vàng)</span>
                </h3>
                <div class="grid grid-cols-2 gap-3 text-xs font-bold">
                    <div>
                        <label class="block text-slate-600 mb-1">Size Vòng Nguyệt Quế (<span id="val-w1">112</span>px)</label>
                        <input type="range" id="slider-w1" min="60" max="180" value="112" class="w-full accent-amber-500" oninput="updateTuner()">
                    </div>
                    <div>
                        <label class="block text-slate-600 mb-1">Size Avatar Tròn (<span id="val-a1">72</span>px)</label>
                        <input type="range" id="slider-a1" min="40" max="120" value="72" class="w-full accent-amber-500" oninput="updateTuner()">
                    </div>
                    <div>
                        <label class="block text-slate-600 mb-1">Tọa độ Nguyệt Quế X (<span id="val-x1">0</span>px)</label>
                        <input type="range" id="slider-x1" min="-40" max="40" value="0" class="w-full accent-amber-500" oninput="updateTuner()">
                    </div>
                    <div>
                        <label class="block text-slate-600 mb-1">Tọa độ Nguyệt Quế Y (<span id="val-y1">0</span>px)</label>
                        <input type="range" id="slider-y1" min="-40" max="40" value="0" class="w-full accent-amber-500" oninput="updateTuner()">
                    </div>
                </div>
            </div>

            <!-- TOP 2 CONTROLS -->
            <div class="p-4 bg-slate-100 rounded-2xl border border-slate-300 flex flex-col gap-3">
                <h3 class="font-extrabold text-slate-800 text-xs uppercase flex items-center gap-1.5">
                    <span>🥈 Top 2 (Vòng Bạc)</span>
                </h3>
                <div class="grid grid-cols-2 gap-3 text-xs font-bold">
                    <div>
                        <label class="block text-slate-600 mb-1">Size Vòng Nguyệt Quế (<span id="val-w2">88</span>px)</label>
                        <input type="range" id="slider-w2" min="50" max="140" value="88" class="w-full accent-slate-600" oninput="updateTuner()">
                    </div>
                    <div>
                        <label class="block text-slate-600 mb-1">Size Avatar Tròn (<span id="val-a2">56</span>px)</label>
                        <input type="range" id="slider-a2" min="30" max="90" value="56" class="w-full accent-slate-600" oninput="updateTuner()">
                    </div>
                    <div>
                        <label class="block text-slate-600 mb-1">Tọa độ Nguyệt Quế X (<span id="val-x2">0</span>px)</label>
                        <input type="range" id="slider-x2" min="-30" max="30" value="0" class="w-full accent-slate-600" oninput="updateTuner()">
                    </div>
                    <div>
                        <label class="block text-slate-600 mb-1">Tọa độ Nguyệt Quế Y (<span id="val-y2">0</span>px)</label>
                        <input type="range" id="slider-y2" min="-30" max="30" value="0" class="w-full accent-slate-600" oninput="updateTuner()">
                    </div>
                </div>
            </div>

            <!-- TOP 3 CONTROLS -->
            <div class="p-4 bg-orange-50/80 rounded-2xl border border-orange-200 flex flex-col gap-3">
                <h3 class="font-extrabold text-amber-900 text-xs uppercase flex items-center gap-1.5">
                    <span>🥉 Top 3 (Vòng Đồng)</span>
                </h3>
                <div class="grid grid-cols-2 gap-3 text-xs font-bold">
                    <div>
                        <label class="block text-slate-600 mb-1">Size Vòng Nguyệt Quế (<span id="val-w3">88</span>px)</label>
                        <input type="range" id="slider-w3" min="50" max="140" value="88" class="w-full accent-amber-700" oninput="updateTuner()">
                    </div>
                    <div>
                        <label class="block text-slate-600 mb-1">Size Avatar Tròn (<span id="val-a3">56</span>px)</label>
                        <input type="range" id="slider-a3" min="30" max="90" value="56" class="w-full accent-amber-700" oninput="updateTuner()">
                    </div>
                    <div>
                        <label class="block text-slate-600 mb-1">Tọa độ Nguyệt Quế X (<span id="val-x3">0</span>px)</label>
                        <input type="range" id="slider-x3" min="-30" max="30" value="0" class="w-full accent-amber-700" oninput="updateTuner()">
                    </div>
                    <div>
                        <label class="block text-slate-600 mb-1">Tọa độ Nguyệt Quế Y (<span id="val-y3">0</span>px)</label>
                        <input type="range" id="slider-y3" min="-30" max="30" value="0" class="w-full accent-amber-700" oninput="updateTuner()">
                    </div>
                </div>
            </div>
        </div>

        <!-- ACTIONS -->
        <div class="flex gap-3 mt-2">
            <button onclick="saveConfig()" class="flex-1 py-3 bg-sky-500 hover:bg-sky-600 active:scale-95 text-white font-extrabold rounded-2xl shadow-lg transition-all text-xs flex items-center justify-center gap-2">
                <span>💾 Lưu Cấu Hình Vào Web</span>
            </button>
            <button onclick="resetConfig()" class="px-4 py-3 bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold rounded-2xl text-xs transition-all">
                <span>🔄 Mặc Định</span>
            </button>
        </div>
        <div id="save-status" class="text-center text-xs font-bold text-emerald-600 hidden">✅ Đã lưu cấu hình! Truy cập trang Quảng Trường để xem kết quả.</div>
    </div>

    <script>
        const defaultConfig = {
            t1_w: 121, t1_a: 81, t1_x: 0, t1_y: 3,
            t2_w: 106, t2_a: 72, t2_x: 0, t2_y: 1,
            t3_w: 88,  t3_a: 60, t3_x: 0, t3_y: 1
        };

        function getConfig() {
            const saved = localStorage.getItem('smurf_tuner_config');
            if (!saved) return defaultConfig;
            const parsed = JSON.parse(saved);
            return { ...defaultConfig, ...parsed };
        }

        function initTuner() {
            const c = getConfig();
            document.getElementById('slider-w1').value = c.t1_w;
            document.getElementById('slider-a1').value = c.t1_a;
            document.getElementById('slider-x1').value = c.t1_x;
            document.getElementById('slider-y1').value = c.t1_y;

            document.getElementById('slider-w2').value = c.t2_w;
            document.getElementById('slider-a2').value = c.t2_a;
            document.getElementById('slider-x2').value = c.t2_x;
            document.getElementById('slider-y2').value = c.t2_y;

            document.getElementById('slider-w3').value = c.t3_w;
            document.getElementById('slider-a3').value = c.t3_a;
            document.getElementById('slider-x3').value = c.t3_x;
            document.getElementById('slider-y3').value = c.t3_y;

            updateTuner();
        }

        function updateTuner() {
            const w1 = parseInt(document.getElementById('slider-w1').value);
            const a1 = parseInt(document.getElementById('slider-a1').value);
            const x1 = parseInt(document.getElementById('slider-x1').value);
            const y1 = parseInt(document.getElementById('slider-y1').value);

            const w2 = parseInt(document.getElementById('slider-w2').value);
            const a2 = parseInt(document.getElementById('slider-a2').value);
            const x2 = parseInt(document.getElementById('slider-x2').value);
            const y2 = parseInt(document.getElementById('slider-y2').value);

            const w3 = parseInt(document.getElementById('slider-w3').value);
            const a3 = parseInt(document.getElementById('slider-a3').value);
            const x3 = parseInt(document.getElementById('slider-x3').value);
            const y3 = parseInt(document.getElementById('slider-y3').value);

            // Update Labels
            document.getElementById('val-w1').textContent = w1;
            document.getElementById('val-a1').textContent = a1;
            document.getElementById('val-x1').textContent = x1;
            document.getElementById('val-y1').textContent = y1;

            document.getElementById('val-w2').textContent = w2;
            document.getElementById('val-a2').textContent = a2;
            document.getElementById('val-x2').textContent = x2;
            document.getElementById('val-y2').textContent = y2;

            document.getElementById('val-w3').textContent = w3;
            document.getElementById('val-a3').textContent = a3;
            document.getElementById('val-x3').textContent = x3;
            document.getElementById('val-y3').textContent = y3;

            // Apply Top 1
            const box1 = document.getElementById('box-top1');
            const avt1 = document.getElementById('avatar-top1');
            const wrt1 = document.getElementById('wreath-top1');
            box1.style.width = Math.max(w1, a1) + 'px';
            box1.style.height = Math.max(w1, a1) + 'px';
            avt1.style.width = a1 + 'px';
            avt1.style.height = a1 + 'px';
            wrt1.style.width = w1 + 'px';
            wrt1.style.height = w1 + 'px';
            wrt1.style.transform = `translate(${x1}px, ${y1}px)`;

            // Apply Top 2
            const box2 = document.getElementById('box-top2');
            const avt2 = document.getElementById('avatar-top2');
            const wrt2 = document.getElementById('wreath-top2');
            box2.style.width = Math.max(w2, a2) + 'px';
            box2.style.height = Math.max(w2, a2) + 'px';
            avt2.style.width = a2 + 'px';
            avt2.style.height = a2 + 'px';
            wrt2.style.width = w2 + 'px';
            wrt2.style.height = w2 + 'px';
            wrt2.style.transform = `translate(${x2}px, ${y2}px)`;

            // Apply Top 3
            const box3 = document.getElementById('box-top3');
            const avt3 = document.getElementById('avatar-top3');
            const wrt3 = document.getElementById('wreath-top3');
            box3.style.width = Math.max(w3, a3) + 'px';
            box3.style.height = Math.max(w3, a3) + 'px';
            avt3.style.width = a3 + 'px';
            avt3.style.height = a3 + 'px';
            wrt3.style.width = w3 + 'px';
            wrt3.style.height = w3 + 'px';
            wrt3.style.transform = `translate(${x3}px, ${y3}px)`;
        }

        function saveConfig() {
            const config = {
                t1_w: parseInt(document.getElementById('slider-w1').value),
                t1_a: parseInt(document.getElementById('slider-a1').value),
                t1_x: parseInt(document.getElementById('slider-x1').value),
                t1_y: parseInt(document.getElementById('slider-y1').value),

                t2_w: parseInt(document.getElementById('slider-w2').value),
                t2_a: parseInt(document.getElementById('slider-a2').value),
                t2_x: parseInt(document.getElementById('slider-x2').value),
                t2_y: parseInt(document.getElementById('slider-y2').value),

                t3_w: parseInt(document.getElementById('slider-w3').value),
                t3_a: parseInt(document.getElementById('slider-a3').value),
                t3_x: parseInt(document.getElementById('slider-x3').value),
                t3_y: parseInt(document.getElementById('slider-y3').value)
            };
            localStorage.setItem('smurf_tuner_config', JSON.stringify(config));

            const status = document.getElementById('save-status');
            status.classList.remove('hidden');
            setTimeout(() => status.classList.add('hidden'), 3000);
        }

        function resetConfig() {
            localStorage.removeItem('smurf_tuner_config');
            initTuner();
        }

        window.onload = initTuner;
    </script>
</body>
</html>
